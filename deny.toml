# Cargo dependency policy for the public Palladin Agent runtime.
# Any exception must be narrow, justified in this file, and approved by CODEOWNERS.

[graph]
all-features = true

[advisories]
ignore = [
    # The runtime uses rsa only to parse public keys and verify PKCS#1 v1.5
    # consent signatures. Private-key operations exist only in local unit tests,
    # so the remote timing/key-recovery precondition does not exist here. Remove
    # this exception when the upstream advisory has a patched release.
    { id = "RUSTSEC-2023-0071", reason = "Public-key verification only in production; no private RSA operation is exposed to remote timing observation" },
]

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
]
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
# Workspace crates use path-only dependencies, which cargo-deny represents as
# wildcards. External dependencies remain locked in Cargo.lock and dependency
# changes are separately reviewed by the pull-request dependency gate.
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = true
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
