name: Release Meta-Package Candidate

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Protected tag whose platform packages were approved"
        required: true
        type: string
      version:
        description: "Exact approved platform version"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-meta-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  authorize:
    name: Verify approved platform candidates
    if: github.actor == 'patryk-roguszewski'
    runs-on: ubuntu-latest
    environment: release-prepare
    timeout-minutes: 8
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm install --global npm@11.18.0

      - id: source
        name: Verify tag and all eight public platform versions
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$RELEASE_TAG" = "v$VERSION"
          source_sha=$(git rev-parse HEAD)
          test "$GITHUB_REF" = "refs/tags/$RELEASE_TAG"
          test "$GITHUB_SHA" = "$source_sha"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$source_sha"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$source_sha" origin/main

          packages=(
            @palladin/runtime-darwin-arm64
            @palladin/runtime-darwin-x64
            @palladin/runtime-linux-arm64-gnu
            @palladin/runtime-linux-arm64-musl
            @palladin/runtime-linux-x64-gnu
            @palladin/runtime-linux-x64-musl
            @palladin/runtime-win32-arm64
            @palladin/runtime-win32-x64
          )
          for package in "${packages[@]}"; do
            test "$(npm view "$package@$VERSION" version --json)" = "\"$VERSION\""
            test "$(npm view "$package" dist-tags.candidate --json)" = "\"$VERSION\""
          done
          echo "source_sha=$source_sha" >>"$GITHUB_OUTPUT"

  smoke-native:
    name: Registry smoke - ${{ matrix.platform }}
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: macOS-arm64
            runtime_package: runtime-darwin-arm64
          - runner: macos-15-intel
            platform: macOS-x64
            runtime_package: runtime-darwin-x64
          - runner: windows-11-arm
            platform: Windows-arm64
            runtime_package: runtime-win32-arm64
          - runner: windows-2025
            platform: Windows-x64
            runtime_package: runtime-win32-x64
          - runner: ubuntu-24.04-arm
            platform: Linux-GNU-arm64
            runtime_package: runtime-linux-arm64-gnu
          - runner: ubuntu-24.04
            platform: Linux-GNU-x64
            runtime_package: runtime-linux-x64-gnu
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.authorize.outputs.source_sha }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm install --global npm@11.18.0
      - run: npm ci --ignore-scripts --workspaces=false
      - run: npm run build

      - name: Build the exact local meta-package candidate
        shell: bash
        run: |
          set -euo pipefail
          node packaging/npm/stage-meta-package.mjs \
            --source . --output-dir "$RUNNER_TEMP/meta" --version "${{ inputs.version }}"
          npm pack "$RUNNER_TEMP/meta" --pack-destination "$RUNNER_TEMP" >/dev/null

      - name: Install from the registry and execute the native package
        shell: bash
        env:
          RUNTIME_PACKAGE: ${{ matrix.runtime_package }}
        run: |
          set -euo pipefail
          meta=$(find "$RUNNER_TEMP" -maxdepth 1 -name 'palladin-agent-*.tgz' -print -quit)
          test -n "$meta"
          smoke="$RUNNER_TEMP/registry-smoke"
          mkdir -p "$smoke"
          npm install --prefix "$smoke" --ignore-scripts --package-lock "$meta"
          test -f "$smoke/node_modules/@palladin/$RUNTIME_PACKAGE/package.json"
          node "$smoke/node_modules/@palladin/agent/dist/bin/palladin.js" --version
          npm audit signatures --prefix "$smoke"

  smoke-musl:
    name: Registry smoke - Linux musl ${{ matrix.architecture }}
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            architecture: x64
            docker_architecture: amd64
          - runner: ubuntu-24.04-arm
            architecture: arm64
            docker_architecture: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.authorize.outputs.source_sha }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - run: npm ci --ignore-scripts --workspaces=false
      - run: npm run build
      - name: Build the exact local meta-package candidate
        run: |
          set -euo pipefail
          node packaging/npm/stage-meta-package.mjs \
            --source . --output-dir "$RUNNER_TEMP/meta" --version "${{ inputs.version }}"
          npm pack "$RUNNER_TEMP/meta" --pack-destination "$RUNNER_TEMP" >/dev/null

      - name: Resolve through npm on native Alpine
        run: |
          set -euo pipefail
          meta=$(find "$RUNNER_TEMP" -maxdepth 1 -name 'palladin-agent-*.tgz' -print -quit)
          test -n "$meta"
          mkdir -p "$RUNNER_TEMP/musl-smoke"
          cp "$meta" "$RUNNER_TEMP/musl-smoke/palladin-agent.tgz"
          docker run --rm --platform "linux/${{ matrix.docker_architecture }}" \
            --volume "$RUNNER_TEMP/musl-smoke:/release:ro" \
            --tmpfs /smoke node:24-alpine3.22 sh -euc '
              npm install --global npm@11.18.0 >/dev/null
              npm install --prefix /smoke --ignore-scripts --package-lock /release/palladin-agent.tgz
              test -f /smoke/node_modules/@palladin/runtime-linux-${{ matrix.architecture }}-musl/package.json
              node /smoke/node_modules/@palladin/agent/dist/bin/palladin.js --version
              npm audit signatures --prefix /smoke
            '

  stage-meta:
    name: Attest and stage @palladin/agent
    needs: [authorize, smoke-native, smoke-musl]
    runs-on: ubuntu-latest
    environment: npm-release
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.authorize.outputs.source_sha }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm install --global npm@11.18.0
      - run: npm ci --ignore-scripts --workspaces=false
      - run: npm run build
      - run: npm test

      - name: Stage the public meta-package directory
        run: >-
          node packaging/npm/stage-meta-package.mjs
          --source . --output-dir "$RUNNER_TEMP/meta" --version "${{ inputs.version }}"

      - name: Pack the meta-package
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/meta-release"
          npm pack "$RUNNER_TEMP/meta" --pack-destination "$RUNNER_TEMP/meta-release" >/dev/null

      - name: Generate the meta-package SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ runner.temp }}/meta
          format: spdx-json
          output-file: ${{ runner.temp }}/meta-release/sbom-agent.spdx.json
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Generate the meta release manifest
        run: |
          set -euo pipefail
          release="$RUNNER_TEMP/meta-release"
          node packaging/npm/generate-release-manifest.mjs \
            --artifacts "$release" --version "${{ inputs.version }}" \
            --source-sha "${{ needs.authorize.outputs.source_sha }}" \
            --sbom "$release/sbom-agent.spdx.json" \
            --manifest "$release/release-manifest-agent.json" \
            --checksums "$release/SHA256SUMS-agent"
          node packaging/npm/verify-release-manifest.mjs \
            --artifacts "$release" --version "${{ inputs.version }}" \
            --source-sha "${{ needs.authorize.outputs.source_sha }}" \
            --sbom "$release/sbom-agent.spdx.json" \
            --manifest "$release/release-manifest-agent.json" \
            --checksums "$release/SHA256SUMS-agent"

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/meta-release/*

      - uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ runner.temp }}/meta-release/*
          sbom-path: ${{ runner.temp }}/meta-release/sbom-agent.spdx.json

      - name: Add the attested meta assets to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find "$RUNNER_TEMP/meta-release" -type f -print | sort)
          gh release upload "${{ inputs.release_tag }}" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY"

      - name: Stage the meta-package under latest
        run: |
          set -euo pipefail
          package=$(find "$RUNNER_TEMP/meta-release" -name 'palladin-agent-*.tgz' -print -quit)
          test -n "$package"
          npm stage publish "$package" --tag latest --provenance --ignore-scripts

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meta-release-${{ inputs.version }}-${{ needs.authorize.outputs.source_sha }}
          path: ${{ runner.temp }}/meta-release/*
          if-no-files-found: error
          retention-days: 30

      - name: Record the final manual npm approval boundary
        run: |
          cat >>"$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          `@palladin/agent` was staged with the immutable `latest` tag after all eight native registry smokes passed.

          Patryk must inspect and approve this single stage with npm 2FA. Run `release-finalize.yml` only after the exact meta-package is public.
          SUMMARY
