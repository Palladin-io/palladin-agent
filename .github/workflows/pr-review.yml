name: "Claude Code: PR Review"

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Numer PR do przeglądu"
        required: true
      user_context:
        description: "Dodatkowe instrukcje dla reviewera"
        required: false

permissions:
  contents: read
  pull-requests: write

env:
  CLAUDE_MODEL: claude-opus-4-7

concurrency:
  group: claude-review-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: >
      (github.event_name == 'pull_request' &&
       github.actor != 'github-actions[bot]') ||
      github.event_name == 'workflow_dispatch'
    name: Claude Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve PR number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "number=$PR_NUMBER_FROM_EVENT" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          HEAD=$(gh pr view "$PR" --json headRefName --jq '.headRefName')
          git fetch origin "$HEAD"
          git checkout -B "$HEAD" "origin/$HEAD"

      - name: Fetch PR data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr view "$PR" --json number,title,body,author,additions,deletions,changedFiles,headRefName,baseRefName > /tmp/pr_meta.json
          gh pr diff "$PR" > /tmp/pr_diff.patch
          gh pr view "$PR" --json files --jq '.files[].path' > /tmp/pr_files.txt
          gh pr view "$PR" --json reviews > /tmp/pr_reviews.json
          gh api "repos/${REPO}/pulls/${PR}/comments" > /tmp/pr_inline_comments.json

      - name: Run Claude Code review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          USER_CONTEXT: ${{ github.event.inputs.user_context }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          {
            echo '## Pre-fetched PR data'
            echo ''
            echo 'Use these files instead of running gh commands:'
            echo '- /tmp/pr_meta.json — metadata (read with: jq . /tmp/pr_meta.json)'
            echo '- /tmp/pr_diff.patch — full diff (use Read tool)'
            echo '- /tmp/pr_files.txt — changed file paths (use Read tool)'
            echo '- /tmp/pr_reviews.json — poprzednie review z werdyktami (SPRAWDŹ PRZED RECENZJĄ)'
            echo '- /tmp/pr_inline_comments.json — komentarze inline z poprzednich review'
            echo ''
            echo '---'
            echo ''
            sed "s/\$ARGUMENTS/${PR}/g" .claude/skills/pr-review/SKILL.md \
              | grep -v '^!`'
            if [ -n "$USER_CONTEXT" ]; then
              echo ''
              echo '## Additional instructions'
              echo ''
              echo "$USER_CONTEXT"
            fi
          } > /tmp/review_prompt.md

          claude -p \
            --model "$CLAUDE_MODEL" \
            --max-turns 120 \
            --dangerously-skip-permissions \
            --allowedTools "Bash(gh:*),Bash(jq:*),Read,Glob,Grep" \
            < /tmp/review_prompt.md
