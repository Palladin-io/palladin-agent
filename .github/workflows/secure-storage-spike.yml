name: Secure storage native spike

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/secure-storage-spike.yml
      - spikes/secure-storage/**

permissions:
  contents: read

jobs:
  macos-convenience:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: ./spikes/secure-storage/macos/run.sh

  windows-convenience:
    runs-on: windows-2025
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - shell: pwsh
        run: ./spikes/secure-storage/windows/dpapi-spike.ps1

  linux-boundaries:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: ./spikes/secure-storage/linux/uid-boundary-spike.sh
