name: Windows Signed Runtime

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Pełny, zaufany SHA commita do podpisania"
        required: true
        type: string
      version:
        description: "Czteroczęściowa wersja MSIX, np. 0.2.0.0"
        required: true
        type: string
      package_version:
        description: "Atomowa wersja npm/Rust, np. 0.2.0"
        required: true
        type: string
      security_floor:
        description: "Minimalna dozwolona wersja bezpieczeństwa"
        required: true
        type: string
      release_base_uri:
        description: "HTTPS katalogu podpisanych artefaktów bez końcowego ukośnika"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: windows-signed-runtime-${{ inputs.source_sha }}
  cancel-in-progress: false

jobs:
  authorize:
    name: Autoryzacja właściciela
    if: github.actor == 'patryk-roguszewski'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Potwierdź ręczne uruchomienie i format wejścia
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          SECURITY_FLOOR: ${{ inputs.security_floor }}
          RELEASE_BASE_URI: ${{ inputs.release_base_uri }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$VERSION" = "$PACKAGE_VERSION.0"
          [[ "$SECURITY_FLOOR" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$RELEASE_BASE_URI" =~ ^https://[^[:space:]]+$ ]]

  build-native:
    name: Natywny build ${{ matrix.architecture }}
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            architecture: x64
            os_architecture: X64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            architecture: arm64
            os_architecture: Arm64
    runs-on: ${{ matrix.runner }}
    environment: windows-signing
    timeout-minutes: 30
    env:
      PALLADIN_WINDOWS_PACKAGE_FAMILY_NAME: ${{ vars.PALLADIN_WINDOWS_COMPANION_PFN }}
      PALLADIN_WINDOWS_PUBLISHER: ${{ vars.PALLADIN_WINDOWS_PUBLISHER }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Zweryfikuj SHA i pochodzenie z main
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$SOURCE_SHA" origin/main
      - name: Potwierdź natywną architekturę runnera
        shell: pwsh
        env:
          EXPECTED_ARCHITECTURE: ${{ matrix.os_architecture }}
        run: |
          if ([Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString() -cne $env:EXPECTED_ARCHITECTURE) {
            throw 'runner architecture does not match release architecture'
          }
      - name: Zbuduj pięć osobnych binarek fail-closed
        working-directory: runtime
        shell: pwsh
        run: |
          if ($env:PALLADIN_WINDOWS_PACKAGE_FAMILY_NAME -cnotmatch '^Palladin\.Runtime\.Companion_[a-z0-9]{13}$') { throw 'protected Companion PFN is missing or invalid' }
          Import-Module (Resolve-Path '../packaging/windows/scripts/Palladin.Release.psm1') -Force
          $derivedPfn = Get-PalladinPackageFamilyName -Name 'Palladin.Runtime.Companion' -Publisher $env:PALLADIN_WINDOWS_PUBLISHER
          if ($derivedPfn -cne $env:PALLADIN_WINDOWS_PACKAGE_FAMILY_NAME) { throw 'protected Companion PFN does not match the protected publisher' }
          rustup target add '${{ matrix.target }}'
          cargo build --release --locked --target '${{ matrix.target }}' -p palladin-cli -p palladin-windows-broker -p palladin-windows-executor --bins
          $source = Join-Path $PWD 'target/${{ matrix.target }}/release'
          Copy-Item -LiteralPath (Join-Path $source 'palladin.exe') -Destination (Join-Path $source 'palladin-worker.exe')
          $output = Join-Path $env:RUNNER_TEMP 'native-${{ matrix.architecture }}'
          New-Item -ItemType Directory -Path $output | Out-Null
          foreach ($name in 'palladin-client', 'palladin-companion', 'palladin-service', 'palladin-worker', 'palladin-executor') {
            $path = Join-Path $source "$name.exe"
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) { throw "missing required binary: $name.exe" }
            Copy-Item -LiteralPath $path -Destination $output
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unsigned-windows-${{ matrix.architecture }}-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/native-${{ matrix.architecture }}
          if-no-files-found: error
          retention-days: 1

  sign-package:
    name: Podpisz, spakuj i zweryfikuj
    needs: [authorize, build-native]
    runs-on: windows-2025
    environment: windows-signing
    timeout-minutes: 45
    env:
      PUBLISHER: ${{ vars.PALLADIN_WINDOWS_PUBLISHER }}
      EXPECTED_THUMBPRINT: ${{ vars.PALLADIN_WINDOWS_SIGNER_THUMBPRINT }}
      TIMESTAMP_URL: ${{ vars.PALLADIN_WINDOWS_TIMESTAMP_URL }}
      RELEASE_VERSION: ${{ inputs.version }}
      PACKAGE_VERSION: ${{ inputs.package_version }}
      SECURITY_FLOOR: ${{ inputs.security_floor }}
      RELEASE_BASE_URI: ${{ inputs.release_base_uri }}
      PALLADIN_WINDOWS_PACKAGE_FAMILY_NAME: ${{ vars.PALLADIN_WINDOWS_COMPANION_PFN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Zweryfikuj checkout przed użyciem skryptów release
        shell: pwsh
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          if ($env:PALLADIN_WINDOWS_PACKAGE_FAMILY_NAME -cnotmatch '^Palladin\.Runtime\.Companion_[a-z0-9]{13}$') { throw 'protected Companion PFN is missing or invalid' }
          Import-Module (Resolve-Path './packaging/windows/scripts/Palladin.Release.psm1') -Force
          $derivedPfn = Get-PalladinPackageFamilyName -Name 'Palladin.Runtime.Companion' -Publisher $env:PUBLISHER
          if ($derivedPfn -cne $env:PALLADIN_WINDOWS_PACKAGE_FAMILY_NAME) { throw 'protected Companion PFN does not match the protected publisher' }
          if ((git rev-parse HEAD) -cne $env:SOURCE_SHA) { throw 'unexpected checkout SHA' }
          git fetch --no-tags origin main
          git merge-base --is-ancestor $env:SOURCE_SHA origin/main
          if ($LASTEXITCODE -ne 0) { throw 'source SHA is not an ancestor of main' }
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: unsigned-windows-*-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/native
      - name: Zaimportuj certyfikat do tymczasowego magazynu użytkownika
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERTIFICATE_BASE64 -or -not $env:CERTIFICATE_PASSWORD -or -not $env:PUBLISHER -or -not $env:EXPECTED_THUMBPRINT -or -not $env:TIMESTAMP_URL) { throw 'missing protected signing configuration' }
          $pfx = Join-Path $env:RUNNER_TEMP 'windows-signing.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
          $password = ConvertTo-SecureString $env:CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = @(Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password -Exportable:$false | Where-Object HasPrivateKey)[0]
          if ($null -eq $certificate) { throw 'PFX does not contain a private signing key' }
          if ($certificate.Thumbprint -cne $env:EXPECTED_THUMBPRINT.Replace(' ', '').ToUpperInvariant()) { throw 'imported signer does not match protected thumbprint' }
      - name: Podpisz skrypty instalacyjne i wszystkie PE
        shell: pwsh
        run: |
          $sign = 'packaging/windows/scripts/Sign-Release.ps1'
          $scripts = @('packaging/windows/scripts/Install-SecureRuntime.ps1', 'packaging/windows/scripts/Palladin.Release.psm1')
          & $sign -Artifacts $scripts -CertificateThumbprint $env:EXPECTED_THUMBPRINT -TimestampUrl $env:TIMESTAMP_URL -Publisher $env:PUBLISHER
          foreach ($architecture in 'x64', 'arm64') {
            $directory = Join-Path $env:RUNNER_TEMP "native/unsigned-windows-$architecture-${{ inputs.source_sha }}"
            $artifacts = Get-ChildItem -LiteralPath $directory -Filter '*.exe' | ForEach-Object FullName
            if ($artifacts.Count -ne 5) { throw "expected five $architecture PE artifacts" }
            & $sign -Artifacts $artifacts -CertificateThumbprint $env:EXPECTED_THUMBPRINT -TimestampUrl $env:TIMESTAMP_URL -Publisher $env:PUBLISHER
          }
      - name: Zweryfikuj atomową wersję npm i Rust
        shell: pwsh
        run: |
          $versions = @(
            (node -p 'require("./package.json").version'),
            (node -p 'require("./packages/runtime-win32-x64/package.json").version'),
            (node -p 'require("./packages/runtime-win32-arm64/package.json").version')
          )
          if (($versions | Where-Object { $_ -cne $env:PACKAGE_VERSION }).Count -ne 0) { throw 'npm package versions are not atomic' }
          $cargoVersions = @((cargo metadata --manifest-path runtime/Cargo.toml --format-version 1 --no-deps | ConvertFrom-Json).packages.version | Sort-Object -Unique)
          if ($cargoVersions.Count -ne 1 -or $cargoVersions[0] -cne $env:PACKAGE_VERSION) { throw 'Rust workspace version does not match npm release version' }
      - name: Zbuduj i podpisz architektoniczne MSIX oraz paczki npm
        shell: pwsh
        run: |
          $assets = Join-Path $env:RUNNER_TEMP 'assets'
          packaging/windows/scripts/New-PackagingAssets.ps1 -OutputDirectory $assets
          foreach ($architecture in 'x64', 'arm64') {
            $native = Join-Path $env:RUNNER_TEMP "native/unsigned-windows-$architecture-${{ inputs.source_sha }}"
            $msix = Join-Path $env:RUNNER_TEMP "msix-$architecture"
            packaging/windows/scripts/Build-Msix.ps1 -Architecture $architecture -Version $env:RELEASE_VERSION -Publisher $env:PUBLISHER -BrokerBinary (Join-Path $native 'palladin-service.exe') -WorkerBinary (Join-Path $native 'palladin-worker.exe') -ExecutorBinary (Join-Path $native 'palladin-executor.exe') -CompanionBinary (Join-Path $native 'palladin-companion.exe') -AssetsDirectory $assets -OutputDirectory $msix
            $packages = Get-ChildItem -LiteralPath $msix -Filter '*.msix' | ForEach-Object FullName
            packaging/windows/scripts/Sign-Release.ps1 -Artifacts $packages -CertificateThumbprint $env:EXPECTED_THUMBPRINT -TimestampUrl $env:TIMESTAMP_URL -Publisher $env:PUBLISHER
            $npm = Join-Path $env:RUNNER_TEMP "npm-$architecture"
            packaging/windows/scripts/Stage-NpmPlatformPackage.ps1 -Architecture $architecture -ClientBinary (Join-Path $native 'palladin-client.exe') -OutputDirectory $npm -Publisher $env:PUBLISHER -SignerThumbprint $env:EXPECTED_THUMBPRINT
            $broker = Get-ChildItem -LiteralPath $msix -Filter '*Broker*.msix' | Select-Object -ExpandProperty FullName
            $companion = Get-ChildItem -LiteralPath $msix -Filter '*Companion*.msix' | Select-Object -ExpandProperty FullName
            packaging/windows/scripts/Verify-Release.ps1 -Architecture $architecture -Version $env:RELEASE_VERSION -Publisher $env:PUBLISHER -SignerThumbprint $env:EXPECTED_THUMBPRINT -ClientBinary (Join-Path $native 'palladin-client.exe') -BrokerPackage $broker -CompanionPackage $companion -StagedNpmDirectory $npm
          }
      - name: Zbuduj i podpisz wieloarchitekturne bundle
        shell: pwsh
        run: |
          $bundles = Join-Path $env:RUNNER_TEMP 'bundles'
          New-Item -ItemType Directory -Path $bundles | Out-Null
          foreach ($kind in 'Broker', 'Companion') {
            $x64 = Get-ChildItem "$env:RUNNER_TEMP/msix-x64" -Filter "*$kind*.msix" | Select-Object -ExpandProperty FullName
            $arm64 = Get-ChildItem "$env:RUNNER_TEMP/msix-arm64" -Filter "*$kind*.msix" | Select-Object -ExpandProperty FullName
            $bundle = Join-Path $bundles "Palladin.Runtime.$kind-$($env:RELEASE_VERSION).msixbundle"
            packaging/windows/scripts/Build-MsixBundle.ps1 -Kind $kind -Version $env:RELEASE_VERSION -X64Package $x64 -Arm64Package $arm64 -OutputBundle $bundle
          }
          packaging/windows/scripts/Sign-Release.ps1 -Artifacts (Get-ChildItem $bundles -Filter '*.msixbundle' | ForEach-Object FullName) -CertificateThumbprint $env:EXPECTED_THUMBPRINT -TimestampUrl $env:TIMESTAMP_URL -Publisher $env:PUBLISHER
          packaging/windows/scripts/Render-AppInstaller.ps1 -Version $env:RELEASE_VERSION -Publisher $env:PUBLISHER -BaseUri $env:RELEASE_BASE_URI -OutputPath (Join-Path $bundles 'Palladin.Runtime.appinstaller')
      - name: Zbuduj i podpisz bootstrapper one-UAC dla obu architektur
        shell: pwsh
        run: |
          foreach ($architecture in 'x64', 'arm64') {
            $msix = Join-Path $env:RUNNER_TEMP "msix-$architecture"
            $broker = Get-ChildItem $msix -Filter '*Broker*.msix' | Select-Object -ExpandProperty FullName
            $companion = Get-ChildItem $msix -Filter '*Companion*.msix' | Select-Object -ExpandProperty FullName
            $output = Join-Path $env:RUNNER_TEMP "setup-$architecture"
            if (-not (dotnet --list-sdks | Select-String '^10\.')) { throw '.NET 10 SDK is unavailable' }
            packaging/windows/scripts/Build-Bootstrapper.ps1 -Architecture $architecture -Version $env:RELEASE_VERSION -SecurityFloor $env:SECURITY_FLOOR -Publisher $env:PUBLISHER -SignerThumbprint $env:EXPECTED_THUMBPRINT -BrokerPackage $broker -CompanionPackage $companion -OutputDirectory $output
            packaging/windows/scripts/Sign-Release.ps1 -Artifacts (Join-Path $output 'palladin-runtime-setup.exe') -CertificateThumbprint $env:EXPECTED_THUMBPRINT -TimestampUrl $env:TIMESTAMP_URL -Publisher $env:PUBLISHER
          }
      - name: Zweryfikuj politykę aktualizacji i npm tarball
        shell: pwsh
        run: |
          packaging/windows/scripts/Test-RollbackPolicy.ps1
          npm ci --ignore-scripts --workspaces=false
          npm run build
          npm test -- --run tests/runtime/native-dispatch.test.ts tests/runtime/platform-package.test.ts tests/runtime/windows-packaging.test.ts
          foreach ($architecture in 'x64', 'arm64') {
            npm pack "$env:RUNNER_TEMP/npm-$architecture" --pack-destination $env:RUNNER_TEMP
          }
          npm pack --pack-destination $env:RUNNER_TEMP
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signed-windows-runtime-${{ inputs.version }}-${{ inputs.source_sha }}
          path: |
            ${{ runner.temp }}/bundles/*.msixbundle
            ${{ runner.temp }}/bundles/Palladin.Runtime.appinstaller
            ${{ runner.temp }}/setup-x64/**
            ${{ runner.temp }}/setup-arm64/**
            ${{ runner.temp }}/*.tgz
          if-no-files-found: error
          retention-days: 7
