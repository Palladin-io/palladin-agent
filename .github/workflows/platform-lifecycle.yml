name: Owner-only physical platform lifecycle

on:
  workflow_dispatch:
    inputs:
      baseline_tag:
        description: "Immutable baseline release tag"
        required: true
        type: string
      baseline_version:
        description: "Baseline version N"
        required: true
        type: string
      baseline_source_sha:
        description: "Baseline source commit"
        required: true
        type: string
      candidate_tag:
        description: "Draft candidate release tag"
        required: true
        type: string
      candidate_version:
        description: "Candidate version N+1"
        required: true
        type: string
      candidate_source_sha:
        description: "Candidate source commit"
        required: true
        type: string
      rollback_tag:
        description: "Immutable forward-rollback QA release tag"
        required: true
        type: string
      rollback_version:
        description: "Forward-rollback version N+2"
        required: true
        type: string
      rollback_source_sha:
        description: "Reviewed old-good or revert source commit"
        required: true
        type: string
      confirmation:
        description: "Type: run physical lifecycle gate"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: palladin-physical-lifecycle
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize immutable physical test inputs
    if: github.actor == 'patryk-roguszewski' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: lifecycle-qa
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      source_sha: ${{ steps.verify.outputs.source_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - id: verify
        name: Verify owner, commits, versions, tags, and draft boundary
        env:
          BASELINE_SHA: ${{ inputs.baseline_source_sha }}
          BASELINE_TAG: ${{ inputs.baseline_tag }}
          BASELINE_VERSION: ${{ inputs.baseline_version }}
          CANDIDATE_SHA: ${{ inputs.candidate_source_sha }}
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
          CANDIDATE_VERSION: ${{ inputs.candidate_version }}
          CONFIRMATION: ${{ inputs.confirmation }}
          GH_TOKEN: ${{ github.token }}
          ROLLBACK_SHA: ${{ inputs.rollback_source_sha }}
          ROLLBACK_TAG: ${{ inputs.rollback_tag }}
          ROLLBACK_VERSION: ${{ inputs.rollback_version }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          test "$GITHUB_REF" = refs/heads/main
          test "$CONFIRMATION" = 'run physical lifecycle gate'
          test "$CANDIDATE_SHA" = "$GITHUB_SHA"
          for value in "$BASELINE_SHA" "$CANDIDATE_SHA" "$ROLLBACK_SHA"; do
            [[ "$value" =~ ^[0-9a-f]{40}$ ]]
            git cat-file -e "$value^{commit}"
            git merge-base --is-ancestor "$value" origin/main
          done
          node - "$BASELINE_VERSION" "$CANDIDATE_VERSION" "$ROLLBACK_VERSION" <<'NODE'
          const values = process.argv.slice(2);
          if (values.some((value) => !/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(value))) process.exit(1);
          const number = (value) => value.split('.').map(Number);
          const compare = (a, b) => { for (let i = 0; i < 3; i += 1) if (a[i] !== b[i]) return a[i] - b[i]; return 0; };
          if (compare(number(values[0]), number(values[1])) >= 0 || compare(number(values[1]), number(values[2])) >= 0) process.exit(1);
          NODE
          test "$BASELINE_TAG" = "v$BASELINE_VERSION"
          test "$CANDIDATE_TAG" = "v$CANDIDATE_VERSION"
          test "$ROLLBACK_TAG" = "v$ROLLBACK_VERSION"
          for binding in "$BASELINE_TAG:$BASELINE_SHA" "$CANDIDATE_TAG:$CANDIDATE_SHA" "$ROLLBACK_TAG:$ROLLBACK_SHA"; do
            tag=${binding%%:*}
            source=${binding#*:}
            git fetch --force --no-tags origin "refs/tags/$tag:refs/tags/$tag"
            test "$(git rev-parse "$tag^{commit}")" = "$source"
          done
          candidate=$(gh release view "$CANDIDATE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,tagName)
          test "$(jq -r .isDraft <<<"$candidate")" = true
          test "$(jq -r .tagName <<<"$candidate")" = "$CANDIDATE_TAG"
          echo "source_sha=$CANDIDATE_SHA" >>"$GITHUB_OUTPUT"
      - name: Download and bind all three immutable release sets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/lifecycle-release-sets"
          mkdir -m 700 "$root"
          for phase in baseline candidate forward-rollback; do
            case "$phase" in
              baseline) tag='${{ inputs.baseline_tag }}'; version='${{ inputs.baseline_version }}'; source='${{ inputs.baseline_source_sha }}' ;;
              candidate) tag='${{ inputs.candidate_tag }}'; version='${{ inputs.candidate_version }}'; source='${{ inputs.candidate_source_sha }}' ;;
              forward-rollback) tag='${{ inputs.rollback_tag }}'; version='${{ inputs.rollback_version }}'; source='${{ inputs.rollback_source_sha }}' ;;
            esac
            directory="$root/$phase"
            mkdir -m 700 "$directory"
            gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir "$directory"
            node -e '
              const fs = require("node:fs");
              const [platformPath, agentPath, version, sourceSha] = process.argv.slice(1);
              for (const path of [platformPath, agentPath]) {
                const manifest = JSON.parse(fs.readFileSync(path, "utf8"));
                if (manifest.version !== version || manifest.sourceSha !== sourceSha || !Array.isArray(manifest.artifacts)) process.exit(1);
              }
            ' "$directory/release-manifest.json" "$directory/release-manifest-agent.json" "$version" "$source"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: physical-release-sets-${{ steps.verify.outputs.source_sha }}
          path: ${{ runner.temp }}/lifecycle-release-sets/**
          if-no-files-found: error
          retention-days: 7

  macos:
    name: Physical lifecycle - ${{ matrix.target }}
    needs: authorize
    if: needs.authorize.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: '["self-hosted","palladin-lifecycle","macos","arm64"]'
          - target: macos-x64
            runner: '["self-hosted","palladin-lifecycle","macos","x64"]'
    runs-on: ${{ fromJSON(matrix.runner) }}
    environment: lifecycle-qa
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { ref: '${{ github.sha }}', persist-credentials: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 24, package-manager-cache: false }
      - run: npm install --global npm@11.18.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: 'physical-release-sets-${{ needs.authorize.outputs.source_sha }}', path: '${{ runner.temp }}/lifecycle-release-sets' }
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_LIFECYCLE_QA_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with: { version: 561.0.0 }
      - name: Require native interactive macOS hardware
        run: |
          set -euo pipefail
          test "$(stat -f '%Su' /dev/console)" = "$USER"
          test "$(sysctl -in sysctl.proc_translated 2>/dev/null || echo 0)" = 0
          test "$(uname -m)" = "${{ matrix.target == 'macos-arm64' && 'arm64' || 'x86_64' }}"
      - name: Run the secret-safe lifecycle
        env:
          PALLADIN_APPLICATION_IDENTIFIER: ${{ vars.PALLADIN_MACOS_APPLICATION_IDENTIFIER }}
          PALLADIN_KEYCHAIN_ACCESS_GROUP: ${{ vars.PALLADIN_MACOS_KEYCHAIN_ACCESS_GROUP }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          contract="$RUNNER_TEMP/contract-$TARGET.json"
          output="$RUNNER_TEMP/lifecycle-$TARGET.json"
          node security/lifecycle/write-run-contract.mjs --target "$TARGET" --release-sets "$RUNNER_TEMP/lifecycle-release-sets" --source-sha '${{ needs.authorize.outputs.source_sha }}' --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" --vault-id '${{ vars.PALLADIN_LIFECYCLE_QA_VAULT_ID }}' --entry-id '${{ vars.PALLADIN_LIFECYCLE_QA_ENTRY_ID }}' --output "$output" --contract "$contract"
          gcloud secrets versions access latest --secret='${{ vars.PALLADIN_LIFECYCLE_QA_SECRET }}' | node security/lifecycle/run-physical-target.mjs "$contract"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: 'lifecycle-${{ matrix.target }}', path: '${{ runner.temp }}/lifecycle-${{ matrix.target }}.json', if-no-files-found: error, retention-days: 7 }

  windows:
    name: Physical lifecycle - ${{ matrix.target }}
    needs: authorize
    if: needs.authorize.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-arm64
            runner: '["self-hosted","palladin-lifecycle","windows-11","arm64"]'
          - target: windows-x64
            runner: '["self-hosted","palladin-lifecycle","windows-11","x64"]'
    runs-on: ${{ fromJSON(matrix.runner) }}
    environment: lifecycle-qa
    timeout-minutes: 90
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { ref: '${{ github.sha }}', persist-credentials: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 24, package-manager-cache: false }
      - run: npm install --global npm@11.18.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: 'physical-release-sets-${{ needs.authorize.outputs.source_sha }}', path: '${{ runner.temp }}/lifecycle-release-sets' }
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_LIFECYCLE_QA_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with: { version: 561.0.0 }
      - name: Require native interactive Windows 11 hardware
        shell: pwsh
        run: |
          if ([Environment]::OSVersion.Version.Build -lt 22000) { throw 'Windows 11 is required' }
          if ((Get-Process explorer -ErrorAction SilentlyContinue | Where-Object SessionId -eq ([Diagnostics.Process]::GetCurrentProcess().SessionId)).Count -eq 0) { throw 'interactive desktop is required' }
          if ([Diagnostics.Process]::GetCurrentProcess().SessionId -eq 0) { throw 'session 0 is forbidden' }
          $expected = if ('${{ matrix.target }}' -eq 'windows-arm64') { 'Arm64' } else { 'X64' }
          if ([Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString() -cne $expected) { throw 'native architecture mismatch' }
      - name: Run the secret-safe lifecycle
        shell: pwsh
        env: { TARGET: '${{ matrix.target }}' }
        run: |
          $contract = Join-Path $env:RUNNER_TEMP "contract-$env:TARGET.json"
          $output = Join-Path $env:RUNNER_TEMP "lifecycle-$env:TARGET.json"
          node security/lifecycle/write-run-contract.mjs --target $env:TARGET --release-sets (Join-Path $env:RUNNER_TEMP 'lifecycle-release-sets') --source-sha '${{ needs.authorize.outputs.source_sha }}' --run-id $env:GITHUB_RUN_ID --run-attempt $env:GITHUB_RUN_ATTEMPT --vault-id '${{ vars.PALLADIN_LIFECYCLE_QA_VAULT_ID }}' --entry-id '${{ vars.PALLADIN_LIFECYCLE_QA_ENTRY_ID }}' --output $output --contract $contract
          if ($LASTEXITCODE -ne 0) { throw 'contract generation failed' }
          gcloud secrets versions access latest --secret='${{ vars.PALLADIN_LIFECYCLE_QA_SECRET }}' | node security/lifecycle/run-physical-target.mjs $contract
          if ($LASTEXITCODE -ne 0) { throw 'physical lifecycle failed' }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: 'lifecycle-${{ matrix.target }}', path: '${{ runner.temp }}/lifecycle-${{ matrix.target }}.json', if-no-files-found: error, retention-days: 7 }

  linux:
    name: Physical lifecycle - ${{ matrix.target }}
    needs: authorize
    if: needs.authorize.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: ubuntu-24.04-arm64, runner: '["self-hosted","palladin-lifecycle","ubuntu-24.04","arm64"]', distro: ubuntu, version: '24.04', machine: aarch64 }
          - { target: ubuntu-24.04-x64, runner: '["self-hosted","palladin-lifecycle","ubuntu-24.04","x64"]', distro: ubuntu, version: '24.04', machine: x86_64 }
          - { target: debian-13-arm64, runner: '["self-hosted","palladin-lifecycle","debian-13","arm64"]', distro: debian, version: '13', machine: aarch64 }
          - { target: debian-13-x64, runner: '["self-hosted","palladin-lifecycle","debian-13","x64"]', distro: debian, version: '13', machine: x86_64 }
          - { target: fedora-42-arm64, runner: '["self-hosted","palladin-lifecycle","fedora-42","arm64"]', distro: fedora, version: '42', machine: aarch64 }
          - { target: fedora-42-x64, runner: '["self-hosted","palladin-lifecycle","fedora-42","x64"]', distro: fedora, version: '42', machine: x86_64 }
          - { target: alpine-3.22-arm64, runner: '["self-hosted","palladin-lifecycle","alpine-3.22","arm64"]', distro: alpine, version: '3.22', machine: aarch64 }
          - { target: alpine-3.22-x64, runner: '["self-hosted","palladin-lifecycle","alpine-3.22","x64"]', distro: alpine, version: '3.22', machine: x86_64 }
    runs-on: ${{ fromJSON(matrix.runner) }}
    environment: lifecycle-qa
    timeout-minutes: 90
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { ref: '${{ github.sha }}', persist-credentials: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 24, package-manager-cache: false }
      - run: npm install --global npm@11.18.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: 'physical-release-sets-${{ needs.authorize.outputs.source_sha }}', path: '${{ runner.temp }}/lifecycle-release-sets' }
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_LIFECYCLE_QA_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with: { version: 561.0.0 }
      - name: Require exact native Linux VM
        env: { EXPECTED_ID: '${{ matrix.distro }}', EXPECTED_VERSION: '${{ matrix.version }}', EXPECTED_MACHINE: '${{ matrix.machine }}' }
        run: |
          set -euo pipefail
          . /etc/os-release
          test "$ID" = "$EXPECTED_ID"
          [[ "$VERSION_ID" == "$EXPECTED_VERSION" || "$VERSION_ID" == "$EXPECTED_VERSION".* ]]
          test "$(uname -m)" = "$EXPECTED_MACHINE"
          if grep -Eqi 'qemu|emulat' /proc/cpuinfo; then exit 1; fi
          if [ "$EXPECTED_ID" != alpine ]; then test "$(systemd --version | awk 'NR==1 {print $2}')" -ge 252; fi
      - name: Run the secret-safe lifecycle
        env: { TARGET: '${{ matrix.target }}' }
        run: |
          set -euo pipefail
          contract="$RUNNER_TEMP/contract-$TARGET.json"
          output="$RUNNER_TEMP/lifecycle-$TARGET.json"
          node security/lifecycle/write-run-contract.mjs --target "$TARGET" --release-sets "$RUNNER_TEMP/lifecycle-release-sets" --source-sha '${{ needs.authorize.outputs.source_sha }}' --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" --vault-id '${{ vars.PALLADIN_LIFECYCLE_QA_VAULT_ID }}' --entry-id '${{ vars.PALLADIN_LIFECYCLE_QA_ENTRY_ID }}' --output "$output" --contract "$contract"
          gcloud secrets versions access latest --secret='${{ vars.PALLADIN_LIFECYCLE_QA_SECRET }}' | node security/lifecycle/run-physical-target.mjs "$contract"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: 'lifecycle-${{ matrix.target }}', path: '${{ runner.temp }}/lifecycle-${{ matrix.target }}.json', if-no-files-found: error, retention-days: 7 }

  aggregate:
    name: Aggregate all twelve physical shards
    if: always() && github.actor == 'patryk-roguszewski'
    needs: [authorize, macos, windows, linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: { contents: read }
    steps:
      - name: Require every target job to pass
        env: { AUTHORIZE: '${{ needs.authorize.result }}', MACOS: '${{ needs.macos.result }}', WINDOWS: '${{ needs.windows.result }}', LINUX: '${{ needs.linux.result }}' }
        run: test "$AUTHORIZE" = success && test "$MACOS" = success && test "$WINDOWS" = success && test "$LINUX" = success
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { ref: '${{ github.sha }}', persist-credentials: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 24, package-manager-cache: false }
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { pattern: 'lifecycle-*', path: '${{ runner.temp }}/lifecycle-shards', merge-multiple: true }
      - name: Generate and validate the fail-closed report
        run: |
          set -euo pipefail
          test "$(find "$RUNNER_TEMP/lifecycle-shards" -maxdepth 1 -type f -name 'lifecycle-*.json' | wc -l | tr -d ' ')" = 12
          node security/lifecycle/aggregate-shards.mjs --shards "$RUNNER_TEMP/lifecycle-shards" --source-sha '${{ needs.authorize.outputs.source_sha }}' --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" --output "$RUNNER_TEMP/lifecycle-evidence.json"
          node security/lifecycle/report.mjs generate --evidence "$RUNNER_TEMP/lifecycle-evidence.json" --source-sha '${{ needs.authorize.outputs.source_sha }}' --json "$RUNNER_TEMP/lifecycle-report.json" --markdown "$RUNNER_TEMP/lifecycle-report.md"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lifecycle-report-${{ needs.authorize.outputs.source_sha }}
          path: |
            ${{ runner.temp }}/lifecycle-report.json
            ${{ runner.temp }}/lifecycle-report.md
          if-no-files-found: error
          retention-days: 7

  attach-report:
    name: Attach the verified report to the candidate draft
    needs: [authorize, aggregate]
    runs-on: ubuntu-latest
    environment: lifecycle-qa
    timeout-minutes: 8
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { ref: '${{ github.sha }}', persist-credentials: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 24, package-manager-cache: false }
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: 'lifecycle-report-${{ needs.authorize.outputs.source_sha }}', path: '${{ runner.temp }}/lifecycle-report' }
      - name: Revalidate and upload without replacement
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/lifecycle-report"
          node security/lifecycle/report.mjs validate --source-sha '${{ needs.authorize.outputs.source_sha }}' --json "$report/lifecycle-report.json" --markdown "$report/lifecycle-report.md"
          test "$(gh release view '${{ inputs.candidate_tag }}' --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = true
          gh release upload '${{ inputs.candidate_tag }}' "$report/lifecycle-report.json" "$report/lifecycle-report.md" --repo "$GITHUB_REPOSITORY"
