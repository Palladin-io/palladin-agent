# SECURITY: this workflow pushes commits to a PR branch — keep it workflow_dispatch-only.
# Keep the Bash allowlist narrowed to specific subcommands; do NOT widen back to Bash(git:*)/gh:*/npm:*.
name: "Claude Code: Fix PR"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Numer PR do naprawy"
        required: true
      user_context:
        description: "Dodatkowe instrukcje (opcjonalne)"
        required: false

permissions:
  contents: write
  pull-requests: read
  issues: read

env:
  CLAUDE_MODEL: claude-opus-4-7

jobs:
  fix:
    # Claude fixes are intentionally restricted to the repository owner so
    # collaborators cannot consume the configured OAuth quota.
    if: >
      github.ref == 'refs/heads/main' &&
      github.actor == 'patryk-roguszewski'
    name: Claude Code Fix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve the exact PR head
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          echo "number=$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
          metadata=$(gh pr view "$INPUT_PR_NUMBER" --repo "${{ github.repository }}" --json headRefName,headRefOid,isCrossRepository)
          if [ "$(jq -r '.isCrossRepository' <<<"$metadata")" != false ]; then
            echo 'Claude Fix cannot push to a fork-owned branch' >&2
            exit 1
          fi
          echo "head=$(jq -r '.headRefName' <<<"$metadata")" >> "$GITHUB_OUTPUT"
          echo "sha=$(jq -r '.headRefOid' <<<"$metadata")" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch PR review data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr view "$PR" --json number,title,headRefName,baseRefName,author > /tmp/pr_meta.json
          gh pr view "$PR" --json reviews > /tmp/pr_reviews.json
          gh api "repos/${REPO}/pulls/${PR}/comments" > /tmp/pr_inline_comments.json
          gh pr diff "$PR" --name-only > /tmp/pr_files.txt
          gh pr diff "$PR" > /tmp/pr_diff.patch
          current_sha=$(gh pr view "$PR" --json headRefOid --jq '.headRefOid')
          test "$current_sha" = '${{ steps.pr.outputs.sha }}'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies without running PR code
        run: npm ci --ignore-scripts --workspaces=false

      - name: Run Claude Code fix
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          USER_CONTEXT: ${{ github.event.inputs.user_context }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          {
            echo '## Pre-fetched dane PR'
            echo ''
            echo '- /tmp/pr_meta.json — metadane PR'
            echo '- /tmp/pr_reviews.json — poprzednie review z werdyktami'
            echo '- /tmp/pr_inline_comments.json — komentarze inline do zaadresowania'
            echo '- /tmp/pr_files.txt — zmienione pliki'
            echo '- /tmp/pr_diff.patch — pełny diff'
            echo ''
            echo '---'
            echo ''
            sed "s/\$ARGUMENTS/${PR}/g" .claude/skills/fix-pr/SKILL.md \
              | grep -v '^!`'
            if [ -n "$USER_CONTEXT" ]; then
              echo ''
              echo '## Dodatkowe instrukcje'
              echo ''
              echo "$USER_CONTEXT"
            fi
          } > /tmp/fix_prompt.md

          claude -p \
            --model "$CLAUDE_MODEL" \
            --max-turns 50 \
            --dangerously-skip-permissions \
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(jq:*),Bash(git add:*),Bash(git commit:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git rev-parse:*)" \
            < /tmp/fix_prompt.md

      - name: Validate the fix without credentials
        run: |
          npm run lint
          npm run build
          npm test

      - name: Push only the validated descendant
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head }}
          ORIGINAL_SHA: ${{ steps.pr.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git merge-base "$ORIGINAL_SHA" HEAD)" = "$ORIGINAL_SHA"
          current_sha=$(gh pr view '${{ steps.pr.outputs.number }}' --repo "$GITHUB_REPOSITORY" --json headRefOid --jq '.headRefOid')
          test "$current_sha" = "$ORIGINAL_SHA"
          git -c core.hooksPath=/dev/null \
            -c credential.helper= \
            -c credential.helper='!gh auth git-credential' \
            push --force-with-lease="refs/heads/${HEAD_BRANCH}:${ORIGINAL_SHA}" \
            "https://github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/${HEAD_BRANCH}"
