# SECURITY: this workflow pushes commits to a PR branch — keep it workflow_dispatch-only.
# Keep the Bash allowlist narrowed to specific subcommands; do NOT widen back to Bash(git:*)/gh:*/npm:*.
name: "Claude Code: Fix PR"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Numer PR do naprawy"
        required: true
      user_context:
        description: "Dodatkowe instrukcje (opcjonalne)"
        required: false

permissions:
  contents: write
  pull-requests: read
  issues: read

env:
  CLAUDE_MODEL: claude-opus-4-7

jobs:
  fix:
    # Claude fixes are intentionally restricted to the repository owner so
    # collaborators cannot consume the configured OAuth quota.
    if: >
      github.ref == 'refs/heads/main' &&
      github.actor == 'patryk-roguszewski'
    name: Claude Code Fix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve the exact PR head
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          echo "number=$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
          metadata=$(gh pr view "$INPUT_PR_NUMBER" --repo "${{ github.repository }}" --json headRefName,headRefOid,isCrossRepository)
          if [ "$(jq -r '.isCrossRepository' <<<"$metadata")" != false ]; then
            echo 'Claude Fix cannot push to a fork-owned branch' >&2
            exit 1
          fi
          echo "head=$(jq -r '.headRefName' <<<"$metadata")" >> "$GITHUB_OUTPUT"
          echo "sha=$(jq -r '.headRefOid' <<<"$metadata")" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch PR review data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr view "$PR" --json number,title,headRefName,baseRefName,author > /tmp/pr_meta.json
          gh pr view "$PR" --json reviews > /tmp/pr_reviews.json
          gh api "repos/${REPO}/pulls/${PR}/comments" > /tmp/pr_inline_comments.json
          gh pr diff "$PR" --name-only > /tmp/pr_files.txt
          gh pr diff "$PR" > /tmp/pr_diff.patch
          current_sha=$(gh pr view "$PR" --json headRefOid --jq '.headRefOid')
          test "$current_sha" = '${{ steps.pr.outputs.sha }}'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies without running PR code
        run: npm ci --ignore-scripts --workspaces=false

      - name: Run Claude Code fix
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          USER_CONTEXT: ${{ github.event.inputs.user_context }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          {
            echo '## Pre-fetched dane PR'
            echo ''
            echo '- /tmp/pr_meta.json — metadane PR'
            echo '- /tmp/pr_reviews.json — poprzednie review z werdyktami'
            echo '- /tmp/pr_inline_comments.json — komentarze inline do zaadresowania'
            echo '- /tmp/pr_files.txt — zmienione pliki'
            echo '- /tmp/pr_diff.patch — pełny diff'
            echo ''
            echo '---'
            echo ''
            sed "s/\$ARGUMENTS/${PR}/g" .claude/skills/fix-pr/SKILL.md \
              | grep -v '^!`'
            if [ -n "$USER_CONTEXT" ]; then
              echo ''
              echo '## Dodatkowe instrukcje'
              echo ''
              echo "$USER_CONTEXT"
            fi
          } > /tmp/fix_prompt.md

          claude -p \
            --model "$CLAUDE_MODEL" \
            --max-turns 50 \
            --dangerously-skip-permissions \
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(jq:*),Bash(git add:*),Bash(git commit:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git rev-parse:*)" \
            < /tmp/fix_prompt.md

      - name: Detect required validation gates
        id: validation
        env:
          ORIGINAL_SHA: ${{ steps.pr.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git merge-base "$ORIGINAL_SHA" HEAD)" = "$ORIGINAL_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
          git diff --check "$ORIGINAL_SHA" HEAD

          changed_files="$RUNNER_TEMP/fix-pr-changed-files"
          git diff --name-only -z "$ORIGINAL_SHA" HEAD > "$changed_files"
          rust=false
          workflows=false
          packaging=false
          while IFS= read -r -d '' path; do
            case "$path" in
              runtime/*|deny.toml) rust=true ;;
            esac
            case "$path" in
              .github/workflows/*.yml|.github/workflows/*.yaml) workflows=true ;;
            esac
            case "$path" in
              packaging/*|packages/*|package.json|package-lock.json|.npmrc) packaging=true ;;
            esac
          done < "$changed_files"
          {
            echo "candidate_sha=$(git rev-parse HEAD)"
            echo "rust=$rust"
            echo "workflows=$workflows"
            echo "packaging=$packaging"
          } >> "$GITHUB_OUTPUT"

      - name: Validate the fix without credentials
        run: |
          npm ci --ignore-scripts --workspaces=false
          npm run lint
          npm run build
          npm test

      - name: Install the declared Rust toolchain
        if: steps.validation.outputs.rust == 'true'
        run: rustup toolchain install 1.97.0 --profile minimal

      - name: Validate changed Rust sources
        if: steps.validation.outputs.rust == 'true'
        working-directory: runtime
        run: |
          rustup run 1.97.0 cargo fmt --all -- --check
          rustup run 1.97.0 cargo clippy --workspace --all-targets --locked -- -D warnings
          rustup run 1.97.0 cargo test --workspace --locked

      - name: Validate changed workflow sources
        if: steps.validation.outputs.workflows == 'true'
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -no-color

      - name: Validate changed packaging and release sources
        if: steps.validation.outputs.packaging == 'true'
        shell: bash
        run: |
          set -euo pipefail
          shell_files="$RUNNER_TEMP/palladin-packaging-shell-files"
          find packaging -type f \
            \( -name '*.sh' -o -name postinst -o -name postrm -o -name prerm \) \
            -print0 > "$shell_files"
          while IFS= read -r -d '' file; do
            bash -n "$file"
            shellcheck -x "$file"
          done < "$shell_files"

          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find packaging/npm -type f -name '*.mjs' -print0)
          for manifest in package.json packages/*/package.json; do
            jq empty "$manifest"
          done

          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          paths = [
              Path("packaging/macos/Info.plist.in"),
              Path("packaging/macos/PalladinRuntime.entitlements.in"),
              Path("packaging/linux/polkit/io.palladin.runtime.policy"),
              Path("packaging/windows/bootstrapper/app.manifest"),
              *Path("packaging/windows/manifests").glob("*.appxmanifest.in"),
              *Path("packaging/windows/manifests").glob("*.appinstaller.in"),
          ]
          for path in paths:
              ET.parse(path)
          PY

          # PowerShell, not Bash, expands the expressions in the single-quoted command.
          # shellcheck disable=SC2016
          pwsh -NoLogo -NoProfile -NonInteractive -Command '
            $failed = $false
            Get-ChildItem packaging/windows -Recurse -File |
              Where-Object { $_.Extension -in ".ps1", ".psm1" } |
              ForEach-Object {
                $tokens = $null
                $errors = $null
                [System.Management.Automation.Language.Parser]::ParseFile(
                  $_.FullName, [ref] $tokens, [ref] $errors) > $null
                foreach ($parseError in $errors) {
                  Write-Error "$($_.FullName): $($parseError.Message)"
                  $failed = $true
                }
              }
            if ($failed) { exit 1 }
          '

      - name: Push only the validated descendant
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head }}
          ORIGINAL_SHA: ${{ steps.pr.outputs.sha }}
          VALIDATED_SHA: ${{ steps.validation.outputs.candidate_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$VALIDATED_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
          test "$(git merge-base "$ORIGINAL_SHA" "$VALIDATED_SHA")" = "$ORIGINAL_SHA"
          current_sha=$(gh pr view '${{ steps.pr.outputs.number }}' --repo "$GITHUB_REPOSITORY" --json headRefOid --jq '.headRefOid')
          test "$current_sha" = "$ORIGINAL_SHA"
          git -c core.hooksPath=/dev/null \
            -c credential.helper= \
            -c credential.helper='!gh auth git-credential' \
            push --force-with-lease="refs/heads/${HEAD_BRANCH}:${ORIGINAL_SHA}" \
            "https://github.com/${GITHUB_REPOSITORY}.git" "${VALIDATED_SHA}:refs/heads/${HEAD_BRANCH}"
