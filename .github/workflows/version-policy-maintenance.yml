name: Version Policy Maintenance

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Renew the policy or block a bad immutable version"
        required: true
        type: choice
        options: [renew, incident]
      block_version:
        description: "Incident only - exact immutable version to block"
        required: false
        type: string
      safe_version:
        description: "Incident only - already published safe version for latest"
        required: false
        type: string
      confirmation:
        description: "Type SIGN POLICY"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: palladin-npm-release
  cancel-in-progress: false

jobs:
  sign:
    if: >-
      github.actor == 'patryk-roguszewski' &&
      github.ref == 'refs/heads/main' &&
      inputs.confirmation == 'SIGN POLICY'
    runs-on: ubuntu-latest
    environment: version-policy-signing
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/heads/main
          fetch-depth: 0
          persist-credentials: false

      - name: Verify the protected maintenance source
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          test "$GITHUB_REF" = refs/heads/main
          git fetch --no-tags origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - run: npm ci --ignore-scripts --workspaces=false
      - run: npm run build

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_VERSION_POLICY_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          version: 561.0.0

      - name: Verify KMS key and create the unsigned monotonic successor
        env:
          PUBLIC_KEY: ${{ vars.PALLADIN_VERSION_POLICY_PUBLIC_KEY }}
          MODE: ${{ inputs.mode }}
          BLOCK_VERSION: ${{ inputs.block_version }}
          SAFE_VERSION: ${{ inputs.safe_version }}
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/version-policy"
          mkdir -m 700 "$root"
          generation=$(gcloud storage objects describe \
            "gs://${{ vars.PALLADIN_RELEASE_BUCKET }}/agent/version-policy.json" \
            --format='value(generation)')
          [[ "$generation" =~ ^[1-9][0-9]*$ ]]
          printf '%s' "$generation" >"$root/current-generation"
          gcloud storage cp \
            "gs://${{ vars.PALLADIN_RELEASE_BUCKET }}/agent/version-policy.json" \
            "$root/current.json" --if-generation-match="$generation"
          curl --fail --silent --show-error \
            https://releases.palladin.io/agent/version-policy.json \
            --output "$root/current-endpoint.json"
          cmp --silent "$root/current.json" "$root/current-endpoint.json"
          gcloud kms keys versions get-public-key "${{ vars.GCP_VERSION_POLICY_KEY_VERSION }}" \
            --key "${{ vars.GCP_VERSION_POLICY_KEY }}" \
            --keyring "${{ vars.GCP_VERSION_POLICY_KEYRING }}" \
            --location "${{ vars.GCP_VERSION_POLICY_LOCATION }}" \
            --output-file "$root/public.pem"
          node packaging/npm/verify-kms-public-key.mjs \
            --pem "$root/public.pem" --expected "$PUBLIC_KEY"
          issued_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [[ "$MODE" == renew ]]; then
            test -z "$BLOCK_VERSION" && test -z "$SAFE_VERSION"
            node packaging/npm/renew-version-policy.mjs \
              --current "$root/current.json" --public-key "$PUBLIC_KEY" \
              --issued-at "$issued_at" --output "$root/payload.json"
          else
            test -n "$BLOCK_VERSION" && test -n "$SAFE_VERSION"
            node packaging/npm/create-version-policy-incident-plan.mjs \
              --current "$root/current.json" --block-version "$BLOCK_VERSION" \
              --safe-version "$SAFE_VERSION" --output-dir "$root/incident" \
              --public-key "$PUBLIC_KEY" --issued-at "$issued_at"
            cp "$root/incident/version-policy-unsigned.json" "$root/payload.json"
            {
              echo '### Manual npm incident plan (not executed)'
              echo '```text'
              cat "$root/incident/npm-incident-plan.txt"
              echo '```'
            } >>"$GITHUB_STEP_SUMMARY"
          fi

      - name: Sign raw canonical JSON in Cloud KMS and publish the fixed endpoint
        env:
          PUBLIC_KEY: ${{ vars.PALLADIN_VERSION_POLICY_PUBLIC_KEY }}
          RELEASE_BUCKET: ${{ vars.PALLADIN_RELEASE_BUCKET }}
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/version-policy"
          gcloud kms asymmetric-sign \
            --key "${{ vars.GCP_VERSION_POLICY_KEY }}" \
            --keyring "${{ vars.GCP_VERSION_POLICY_KEYRING }}" \
            --location "${{ vars.GCP_VERSION_POLICY_LOCATION }}" \
            --version "${{ vars.GCP_VERSION_POLICY_KEY_VERSION }}" \
            --input-file "$root/payload.json" --signature-file "$root/signature.txt"
          node packaging/npm/assemble-version-policy-envelope.mjs \
            --payload "$root/payload.json" --signature "$root/signature.txt" \
            --public-key "$PUBLIC_KEY" --output "$root/version-policy.json"
          object=$(node packaging/npm/version-policy-object-name.mjs \
            --bundle "$root/version-policy.json" --public-key "$PUBLIC_KEY")
          immutable="gs://$RELEASE_BUCKET/agent/version-policy/$object"
          if ! gcloud storage cp "$root/version-policy.json" "$immutable" \
            --if-generation-match=0 --cache-control=no-store \
            --content-type=application/json; then
            gcloud storage cp "$immutable" "$root/existing-immutable.json"
            cmp --silent "$root/version-policy.json" "$root/existing-immutable.json"
          fi
          observed_generation=$(cat "$root/current-generation")
          [[ "$observed_generation" =~ ^[1-9][0-9]*$ ]]
          gcloud storage cp "$root/version-policy.json" \
            "gs://$RELEASE_BUCKET/agent/version-policy.json" \
            --if-generation-match="$observed_generation" \
            --cache-control=no-store --content-type=application/json
          for attempt in {1..12}; do
            echo "policy endpoint verification attempt $attempt"
            if curl --fail --silent --show-error \
              https://releases.palladin.io/agent/version-policy.json \
              --output "$root/published.json" && \
              cmp --silent "$root/version-policy.json" "$root/published.json"; then
              exit 0
            fi
            sleep 5
          done
          exit 1
