name: "Codex: PR Review"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Numer PR do przeglądu"
        required: true
      user_context:
        description: "Dodatkowe instrukcje dla reviewera"
        required: false

permissions:
  contents: read

concurrency:
  group: codex-subscription-review
  cancel-in-progress: false

jobs:
  authorize:
    # The public repository keeps subscription-backed reviews manual and owner-only.
    # Requiring main prevents dispatching a branch-modified workflow with the secret.
    if: >
      github.ref == 'refs/heads/main' &&
      github.actor == 'patryk-roguszewski'
    name: Authorize Codex
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Require repository write access
        env:
          ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          PERMISSION=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" --jq '.permission')
          case "$PERMISSION" in
            admin|maintain|write) ;;
            *)
              echo "::error::Codex subscription review requires a trusted actor with repository write access."
              exit 1
              ;;
          esac

  analyze:
    name: Codex Analysis
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      head_sha: ${{ steps.pr_data.outputs.head_sha }}
      review: ${{ steps.run_codex.outputs.review }}
    steps:
      - name: Resolve PR
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
          else
            PR_NUMBER="$PR_NUMBER_FROM_EVENT"
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Checkout trusted reviewer sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch PR data without checking out PR code
        id: pr_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          USER_CONTEXT: ${{ github.event.inputs.user_context }}
        run: |
          gh api "repos/${REPO}/pulls/${PR}" > /tmp/pr_rest.json
          jq '{
            number,
            title,
            body,
            author: .user.login,
            additions,
            deletions,
            changedFiles: .changed_files,
            headRefName: .head.ref,
            headRefOid: .head.sha,
            baseRefName: .base.ref
          }' /tmp/pr_rest.json > /tmp/pr_meta.json
          HEAD_SHA=$(jq -r .head.sha /tmp/pr_rest.json)
          BASE_SHA=$(jq -r .base.sha /tmp/pr_rest.json)
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          PR_REF="refs/remotes/origin/codex-review-${PR}"
          if [ "$(git rev-parse --is-shallow-repository)" = true ]; then
            git fetch --no-tags --no-recurse-submodules --unshallow origin
          fi
          git fetch --no-tags --no-recurse-submodules origin "$BASE_SHA"
          git fetch --no-tags --no-recurse-submodules origin \
            "+refs/pull/${PR}/head:${PR_REF}"
          test "$(git rev-parse "$PR_REF")" = "$HEAD_SHA"
          MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          # Diffing fetched objects never checks out or executes untrusted PR code.
          TOTAL_BYTES=$(git diff --no-ext-diff --no-textconv --no-renames --binary \
            "$MERGE_BASE" "$HEAD_SHA" | wc -c)
          test "$TOTAL_BYTES" -gt 0
          test "$TOTAL_BYTES" -le 8388608

          CHUNK_LIMIT=655360
          CHUNK_INDEX=0
          CHUNK_BYTES=0
          CHUNK_FILES=()
          install -d -m 0700 /tmp/pr_diff_chunks

          flush_chunk() {
            if [ "${#CHUNK_FILES[@]}" -eq 0 ]; then
              return
            fi
            CHUNK_INDEX=$((CHUNK_INDEX + 1))
            printf -v CHUNK_NAME 'chunk-%03d.patch' "$CHUNK_INDEX"
            GIT_LITERAL_PATHSPECS=1 git diff --no-ext-diff --no-textconv --no-renames --binary \
              "$MERGE_BASE" "$HEAD_SHA" -- "${CHUNK_FILES[@]}" \
              > "/tmp/pr_diff_chunks/${CHUNK_NAME}"
            test -s "/tmp/pr_diff_chunks/${CHUNK_NAME}"
            CHUNK_BYTES=0
            CHUNK_FILES=()
          }

          while IFS= read -r -d '' FILE; do
            FILE_BYTES=$(GIT_LITERAL_PATHSPECS=1 git diff --no-ext-diff --no-textconv --no-renames --binary \
              "$MERGE_BASE" "$HEAD_SHA" -- "$FILE" | wc -c)
            test "$FILE_BYTES" -gt 0
            if [ "$FILE_BYTES" -gt "$CHUNK_LIMIT" ]; then
              flush_chunk
              CHUNK_FILES+=("$FILE")
              CHUNK_BYTES=$FILE_BYTES
              flush_chunk
              continue
            fi
            if [ "${#CHUNK_FILES[@]}" -gt 0 ] \
              && [ "$((CHUNK_BYTES + FILE_BYTES))" -gt "$CHUNK_LIMIT" ]; then
              flush_chunk
            fi
            CHUNK_FILES+=("$FILE")
            CHUNK_BYTES=$((CHUNK_BYTES + FILE_BYTES))
          done < <(git diff --name-only -z --no-renames "$MERGE_BASE" "$HEAD_SHA")
          flush_chunk
          test "$CHUNK_INDEX" -gt 0
          gh api --paginate "repos/${REPO}/pulls/${PR}/files" --jq '.[].filename' > /tmp/pr_files.txt
          gh pr view "$PR" --json reviews > /tmp/pr_reviews.json
          gh api --paginate "repos/${REPO}/pulls/${PR}/comments" > /tmp/pr_inline_comments.json
          printf '%s\n' "$USER_CONTEXT" > /tmp/pr_user_context.md

      - name: Build isolated review prompt
        run: |
          REVIEW_ROOT="$RUNNER_TEMP/codex-review"
          install -d -m 0700 "$REVIEW_ROOT" "$REVIEW_ROOT/prompts"
          {
            echo '## AGENTS.md'
            cat AGENTS.md
            echo ''
            echo '## Review criteria'
            cat .agents/skills/pr-review/criteria.md
            echo ''
            echo '## PR metadata'
            cat /tmp/pr_meta.json
            echo ''
            echo '## Changed files'
            cat /tmp/pr_files.txt
            echo ''
            echo '## Previous reviews'
            cat /tmp/pr_reviews.json
            echo ''
            echo '## Previous inline comments'
            cat /tmp/pr_inline_comments.json
            echo ''
            echo '## Maintainer context'
            cat /tmp/pr_user_context.md
          } > "$REVIEW_ROOT/context.md"

          for PATCH in /tmp/pr_diff_chunks/*.patch; do
            PROMPT="$REVIEW_ROOT/prompts/$(basename "${PATCH%.patch}").md"
            {
              cat .github/codex/pr-review.md
              echo ''
              cat "$REVIEW_ROOT/context.md"
              echo ''
              echo '## Assigned pull request diff chunk'
              cat "$PATCH"
            } > "$PROMPT"
          done
          {
            for PATCH in /tmp/pr_diff_chunks/*.patch; do
              echo "### $(basename "${PATCH%.patch}")"
              grep '^diff --git ' "$PATCH" || true
              echo ''
            done
          } > "$REVIEW_ROOT/chunk-manifest.md"
          test "$(find "$REVIEW_ROOT/prompts" -type f -name 'chunk-*.md' | wc -l)" -gt 0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install Codex CLI
        run: npm install -g @openai/codex@0.144.1

      - name: Verify unprivileged Codex user
        run: |
          if sudo -u nobody sudo -n true 2>/dev/null; then
            echo "::error::Expected the Codex runtime user to have no sudo privileges."
            exit 1
          fi

      - name: Run Codex review with ChatGPT subscription
        id: run_codex
        env:
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          CODEX_MODEL: ${{ vars.CODEX_REVIEW_MODEL }}
          CROSS_CHUNK_INSTRUCTIONS: ${{ github.workspace }}/.github/codex/cross-chunk-review.md
          REVIEW_CONTEXT: ${{ runner.temp }}/codex-review/context.md
          REVIEW_MANIFEST: ${{ runner.temp }}/codex-review/chunk-manifest.md
          REVIEW_PROMPTS: ${{ runner.temp }}/codex-review/prompts
          REVIEW_SCHEMA: ${{ github.workspace }}/.github/codex/review-output.schema.json
        run: |
          if [ -z "$CODEX_AUTH_JSON_B64" ]; then
            echo "::error::The CODEX_AUTH_JSON_B64 organization secret is unavailable."
            exit 1
          fi

          SOURCE_PROMPTS="$REVIEW_PROMPTS"
          SOURCE_CONTEXT="$REVIEW_CONTEXT"
          SOURCE_MANIFEST="$REVIEW_MANIFEST"
          SOURCE_CROSS_CHUNK_INSTRUCTIONS="$CROSS_CHUNK_INSTRUCTIONS"
          SOURCE_SCHEMA="$REVIEW_SCHEMA"
          RUNTIME_ROOT="/tmp/palladin-codex-${GITHUB_RUN_ID}"
          AUTH_HOME="$RUNTIME_ROOT/auth"
          EMPTY_WORKSPACE="$RUNTIME_ROOT/workspace"
          PROMPT_DIR="$RUNTIME_ROOT/prompts"
          RESULTS_DIR="$RUNTIME_ROOT/results"
          CODEX_OUTPUT_DIR="$RUNTIME_ROOT/codex-output"
          REVIEW_CONTEXT="$RUNTIME_ROOT/context.md"
          REVIEW_MANIFEST="$RUNTIME_ROOT/chunk-manifest.md"
          CROSS_CHUNK_INSTRUCTIONS="$RUNTIME_ROOT/cross-chunk-review.md"
          REVIEW_SCHEMA="$RUNTIME_ROOT/review-output.schema.json"
          REVIEW_OUTPUT="$RUNTIME_ROOT/result.json"
          trap 'sudo rm -rf "$RUNTIME_ROOT"' EXIT
          install -d -m 0700 \
            "$AUTH_HOME" "$EMPTY_WORKSPACE" "$EMPTY_WORKSPACE/home" \
            "$RESULTS_DIR"
          install -d -m 0755 "$PROMPT_DIR" "$CODEX_OUTPUT_DIR"
          cp "$SOURCE_PROMPTS"/chunk-*.md "$PROMPT_DIR"/
          cp "$SOURCE_CONTEXT" "$REVIEW_CONTEXT"
          cp "$SOURCE_MANIFEST" "$REVIEW_MANIFEST"
          cp "$SOURCE_CROSS_CHUNK_INSTRUCTIONS" "$CROSS_CHUNK_INSTRUCTIONS"
          cp "$SOURCE_SCHEMA" "$REVIEW_SCHEMA"
          printf '%s' "$CODEX_AUTH_JSON_B64" | base64 --decode > "$AUTH_HOME/auth.json"
          chmod 600 "$AUTH_HOME/auth.json"
          jq -e '
            .auth_mode == "chatgpt" and
            ((.tokens.refresh_token // "") | type == "string" and length > 0)
          ' "$AUTH_HOME/auth.json" > /dev/null
          sudo chown -R nobody:nogroup "$AUTH_HOME" "$EMPTY_WORKSPACE"

          BASE_ARGS=(
            exec
            --ephemeral
            --ignore-user-config
            --ignore-rules
            --skip-git-repo-check
            --sandbox read-only
            --disable shell_tool
            --disable apps
            --disable browser_use
            --disable computer_use
            --disable multi_agent
            --cd "$EMPTY_WORKSPACE"
            --output-schema "$REVIEW_SCHEMA"
          )
          if [ -n "$CODEX_MODEL" ]; then
            BASE_ARGS+=(--model "$CODEX_MODEL")
          fi

          run_codex_review() {
            local REVIEW_NAME=$1
            local REVIEW_PROMPT=$2
            local REVIEW_RESULT=$3
            local CODEX_PIPE="$CODEX_OUTPUT_DIR/${REVIEW_NAME}.pipe"
            local RESULT_READER
            local CODEX_EXIT=0
            install -m 0600 /dev/null "$REVIEW_RESULT"
            mkfifo -m 0620 "$CODEX_PIPE"
            sudo chgrp nogroup "$CODEX_PIPE"
            timeout 25m cat "$CODEX_PIPE" > "$REVIEW_RESULT" &
            RESULT_READER=$!
            # shellcheck disable=SC2024 # The trusted runner shell intentionally owns the redirections; Codex only inherits the open descriptors.
            sudo -u nobody env -i \
                HOME="$EMPTY_WORKSPACE/home" \
                CODEX_HOME="$AUTH_HOME" \
                PATH="$PATH" \
                codex "${BASE_ARGS[@]}" --output-last-message "$CODEX_PIPE" - \
                < "$REVIEW_PROMPT" \
                > "$RUNTIME_ROOT/${REVIEW_NAME}-events.log" \
                2> "$RUNTIME_ROOT/${REVIEW_NAME}-error.log" \
              || CODEX_EXIT=$?

            if [ "$CODEX_EXIT" -ne 0 ]; then
              kill "$RESULT_READER" 2>/dev/null || true
              wait "$RESULT_READER" 2>/dev/null || true
              rm -f "$CODEX_PIPE"
              echo "::error::Codex review failed for ${REVIEW_NAME}. Raw CLI output was suppressed because it may contain untrusted PR content."
              exit "$CODEX_EXIT"
            fi
            wait "$RESULT_READER"
            rm -f "$CODEX_PIPE"
            jq -e . "$REVIEW_RESULT" > /dev/null
          }

          for REVIEW_PROMPT in "$PROMPT_DIR"/chunk-*.md; do
            CHUNK_NAME=$(basename "${REVIEW_PROMPT%.md}")
            run_codex_review \
              "$CHUNK_NAME" \
              "$REVIEW_PROMPT" \
              "$RESULTS_DIR/${CHUNK_NAME}.json"
          done

          CHUNK_RESULTS="$RUNTIME_ROOT/chunk-results.json"
          jq -s . "$RESULTS_DIR"/chunk-*.json > "$CHUNK_RESULTS"
          CROSS_CHUNK_PROMPT="$RUNTIME_ROOT/cross-chunk-prompt.md"
          {
            cat "$CROSS_CHUNK_INSTRUCTIONS"
            echo ''
            echo '## Shared pull request context'
            cat "$REVIEW_CONTEXT"
            echo ''
            echo '## Chunk assignments'
            cat "$REVIEW_MANIFEST"
            echo ''
            echo '## Structured chunk review results'
            cat "$CHUNK_RESULTS"
          } > "$CROSS_CHUNK_PROMPT"
          run_codex_review \
            cross-chunk \
            "$CROSS_CHUNK_PROMPT" \
            "$RESULTS_DIR/cross-chunk.json"
          jq -e '.comments | length == 0' "$RESULTS_DIR/cross-chunk.json" > /dev/null

          jq -s '{
            verdict: (if any(.verdict == "CHANGES_REQUESTED") then "CHANGES_REQUESTED" else "APPROVED" end),
            summary: (map(.summary) | join("\n\n")),
            comments: ([.[].comments[]] | unique_by(.path, .line, .body) | .[:50])
          }' "$RESULTS_DIR"/*.json > "$REVIEW_OUTPUT"
          jq -e . "$REVIEW_OUTPUT" > /dev/null
          {
            echo 'review<<CODEX_REVIEW_EOF'
            cat "$REVIEW_OUTPUT"
            echo ''
            echo 'CODEX_REVIEW_EOF'
          } >> "$GITHUB_OUTPUT"

  publish:
    if: >
      always() &&
      needs.analyze.result == 'success' &&
      needs.analyze.outputs.review != ''
    name: Codex Review
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Publish Codex review
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          CODEX_REVIEW: ${{ needs.analyze.outputs.review }}
          HEAD_SHA: ${{ needs.analyze.outputs.head_sha }}
          PR_NUMBER: ${{ needs.analyze.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- palladin-codex-review -->';
            const review = JSON.parse(process.env.CODEX_REVIEW);
            const headSha = process.env.HEAD_SHA;
            const pullNumber = Number(process.env.PR_NUMBER);
            const allowedVerdicts = new Set(['APPROVED', 'CHANGES_REQUESTED']);
            const validComments = Array.isArray(review.comments) && review.comments.every(comment =>
              typeof comment.path === 'string' &&
              comment.path.length > 0 &&
              Number.isInteger(comment.line) &&
              comment.line > 0 &&
              typeof comment.body === 'string' &&
              comment.body.length > 0
            );

            if (
              !Number.isInteger(pullNumber) ||
              !/^[0-9a-f]{40}$/.test(headSha) ||
              !allowedVerdicts.has(review.verdict) ||
              typeof review.summary !== 'string' ||
              review.summary.length === 0 ||
              !validComments
            ) {
              core.setFailed('Codex returned an invalid review contract.');
              return;
            }

            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
            });
            if (pull.head.sha !== headSha) {
              core.setFailed('The pull request changed after Codex analysis. Run the review again.');
              return;
            }

            const existingComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              per_page: 100,
            });
            const fallbackFindings = [];

            for (const comment of review.comments.slice(0, 50)) {
              const body = `🤖 **Codex** — ${comment.body.slice(0, 5000)}`;
              const duplicate = existingComments.some(existing =>
                existing.path === comment.path &&
                existing.line === comment.line &&
                existing.body === body
              );

              if (duplicate) {
                continue;
              }

              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pullNumber,
                  commit_id: headSha,
                  path: comment.path,
                  line: comment.line,
                  side: 'RIGHT',
                  body,
                });
              } catch (error) {
                fallbackFindings.push(`- \`${comment.path}:${comment.line}\` — ${comment.body}`);
                core.warning(`Could not publish an inline Codex finding for ${comment.path}:${comment.line}.`);
              }
            }

            const fallbackSection = fallbackFindings.length === 0
              ? ''
              : `\n\n### Findings outside the current diff\n${fallbackFindings.join('\n')}`;
            const body = [
              marker,
              `## 🤖 Codex Review — ${review.verdict}`,
              '',
              review.summary.slice(0, 30000),
              fallbackSection,
              '',
              '_Codex publishes the formal automated review verdict for this pull request._',
            ].join('\n');

            const summaryComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullNumber,
              per_page: 100,
            });
            const existingSummary = summaryComments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.startsWith(marker)
            );

            if (existingSummary) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingSummary.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullNumber,
                body,
              });
            }
