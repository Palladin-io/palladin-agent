name: Rust Runtime

on:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-runtime-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apple:
    name: Build ${{ matrix.target }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: rustup target add ${{ matrix.target }}
      - name: Validate macOS packaging inputs
        shell: bash
        run: |
          set -euo pipefail
          bash -n ../packaging/macos/scripts/*.sh
          plutil -lint ../packaging/macos/Info.plist.in
          plutil -lint ../packaging/macos/PalladinRuntime.entitlements.in
          node --check ../packaging/macos/tests/node-keyring-probe.mjs
          xcrun swiftc -warnings-as-errors -typecheck ../packaging/macos/tests/untrusted-dpk-probe.swift
          fake_root="$(mktemp -d)"
          mkdir -p "$fake_root/PalladinRuntime.app"
          npm_arch=${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x64' }}
          ../packaging/macos/scripts/stage-npm-platform-package.sh \
            --architecture "$npm_arch" \
            --app "$fake_root/PalladinRuntime.app" \
            --output-dir "$fake_root/staged"
          node -e '
            const manifest = require(process.argv[1]);
            if (manifest.private !== undefined) process.exit(1);
            if (JSON.stringify(manifest.os) !== JSON.stringify(["darwin"])) process.exit(1);
            if (JSON.stringify(manifest.cpu) !== JSON.stringify([process.argv[2]])) process.exit(1);
          ' "$fake_root/staged/package.json" "$npm_arch"
      - name: Verify native runner architecture
        shell: bash
        run: |
          set -euo pipefail
          expected=${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x86_64' }}
          test "$(uname -m)" = "$expected"
          translated=$(sysctl -in sysctl.proc_translated 2>/dev/null || true)
          translated=${translated:-0}
          test "$translated" = 0
      - run: >-
          cargo clippy --workspace --all-targets --locked --target ${{ matrix.target }}
          --exclude palladin-linux-broker --exclude palladin-linux-executor
          --exclude palladin-windows-broker --exclude palladin-windows-executor -- -D warnings
      - run: >-
          cargo test --workspace --locked --target ${{ matrix.target }}
          --exclude palladin-linux-broker --exclude palladin-linux-executor
          --exclude palladin-windows-broker --exclude palladin-windows-executor
      - name: Prove Node-seeded Keychain records are deleted by Rust
        working-directory: .
        shell: bash
        env:
          PALLADIN_LEGACY_KEYRING_TEST_PROFILE: cvt332-${{ github.run_id }}-${{ matrix.target }}
        run: |
          set -euo pipefail
          cleanup() {
            node packaging/npm/run-bounded.mjs 30 node \
              packaging/npm/legacy-keyring-interop.mjs cleanup \
              "$PALLADIN_LEGACY_KEYRING_TEST_PROFILE"
          }
          trap cleanup EXIT
          npm ci --ignore-scripts --workspaces=false
          node packaging/npm/run-bounded.mjs 30 node \
            packaging/npm/legacy-keyring-interop.mjs seed \
            "$PALLADIN_LEGACY_KEYRING_TEST_PROFILE"
          node packaging/npm/run-bounded.mjs 60 rustup run 1.97.0 cargo test \
            --manifest-path runtime/Cargo.toml --locked --target "${{ matrix.target }}" \
            -p palladin-platform \
            legacy_typescript_store::tests::os_adapter_deletes_credentials_seeded_by_the_legacy_node_client \
            -- --ignored --exact
          node packaging/npm/run-bounded.mjs 30 node \
            packaging/npm/legacy-keyring-interop.mjs assert-missing \
            "$PALLADIN_LEGACY_KEYRING_TEST_PROFILE"
      - run: cargo build --release --locked --target ${{ matrix.target }} -p palladin-cli
      - run: ./target/${{ matrix.target }}/release/palladin --version
      - name: Hardened build fails closed without Developer ID provisioning
        shell: bash
        env:
          PALLADIN_KEYCHAIN_ACCESS_GROUP: A1B2C3D4E5.io.palladin.runtime
        run: |
          set -euo pipefail
          cargo test --locked --target "${{ matrix.target }}" -p palladin-platform --features macos-hardened
          cargo build --release --locked --target "${{ matrix.target }}" -p palladin-cli --features macos-hardened
          binary="./target/${{ matrix.target }}/release/palladin"
          file "$binary" | grep -F "${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x86_64' }}"
          doctor=$($binary doctor)
          grep -F 'standalone-security-tier: Unavailable' <<<"$doctor"
          if grep -Fq 'standalone-security-tier: Hardened' <<<"$doctor"; then
            echo 'unsigned CI build must not claim Hardened' >&2
            exit 1
          fi

  windows:
    name: Build ${{ matrix.target }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            architecture: x64
            os_architecture: X64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            architecture: arm64
            os_architecture: Arm64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: rustup target add ${{ matrix.target }}
      - name: Validate Windows packaging source
        shell: pwsh
        working-directory: .
        run: |
          foreach ($path in Get-ChildItem packaging/windows/scripts -Include '*.ps1','*.psm1' -Recurse) {
            $errors = $null
            [void][Management.Automation.Language.Parser]::ParseFile($path.FullName, [ref]$null, [ref]$errors)
            if ($errors.Count -ne 0) { throw "PowerShell parse failed for $($path.FullName): $errors" }
          }
          foreach ($path in Get-ChildItem packaging/windows -Include '*.xml','*.in','*.manifest','*.csproj' -Recurse | Where-Object Name -NotLike '*.json.in') {
            if ($path.Name -eq 'Program.cs.in') { continue }
            try { [void][xml](Get-Content -LiteralPath $path.FullName -Raw) } catch { throw "XML parse failed for $($path.FullName): $_" }
          }
          packaging/windows/scripts/Test-RollbackPolicy.ps1
          Import-Module (Resolve-Path './packaging/windows/scripts/Palladin.Release.psm1') -Force
          $testPfn = Get-PalladinPackageFamilyName -Name 'Palladin.Runtime.Companion' -Publisher 'CN=Palladin CI'
          if ($testPfn -cnotmatch '^Palladin\.Runtime\.Companion_[a-z0-9]{13}$') { throw 'test Companion PFN is invalid' }
          "PALLADIN_WINDOWS_PACKAGE_FAMILY_NAME=$testPfn" | Add-Content -LiteralPath $env:GITHUB_ENV
          if ([Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString() -cne '${{ matrix.os_architecture }}') { throw 'emulated Windows runner is forbidden' }
      - name: Build and pin the executor for test hosts
        shell: pwsh
        run: |
          cargo build --locked --target '${{ matrix.target }}' -p palladin-windows-executor --bin palladin-executor
          $debug = './target/${{ matrix.target }}/debug'
          New-Item -ItemType Directory -Force -Path (Join-Path $debug 'deps') | Out-Null
          Copy-Item -LiteralPath (Join-Path $debug 'palladin-executor.exe') -Destination (Join-Path $debug 'deps/palladin-executor.exe')
      - run: >-
          cargo clippy --workspace --all-targets --locked --target ${{ matrix.target }}
          --exclude palladin-linux-broker --exclude palladin-linux-executor -- -D warnings
      - run: >-
          cargo test --workspace --locked --target ${{ matrix.target }}
          --exclude palladin-linux-broker --exclude palladin-linux-executor
      - name: Prove Node-seeded Credential Manager records are deleted by Rust
        working-directory: .
        shell: pwsh
        env:
          PALLADIN_LEGACY_KEYRING_TEST_PROFILE: cvt332-${{ github.run_id }}-${{ matrix.target }}
        run: |
          try {
            npm ci --ignore-scripts --workspaces=false
            if ($LASTEXITCODE -ne 0) { throw 'npm dependency installation failed' }
            node packaging/npm/run-bounded.mjs 30 node `
              packaging/npm/legacy-keyring-interop.mjs seed `
              $env:PALLADIN_LEGACY_KEYRING_TEST_PROFILE
            if ($LASTEXITCODE -ne 0) { throw 'legacy credential seed failed' }
            node packaging/npm/run-bounded.mjs 60 rustup run 1.97.0 cargo test `
              --manifest-path runtime/Cargo.toml --locked --target '${{ matrix.target }}' `
              -p palladin-platform `
              'legacy_typescript_store::tests::os_adapter_deletes_credentials_seeded_by_the_legacy_node_client' `
              -- --ignored --exact
            if ($LASTEXITCODE -ne 0) { throw 'Rust legacy credential deletion failed' }
            node packaging/npm/run-bounded.mjs 30 node `
              packaging/npm/legacy-keyring-interop.mjs assert-missing `
              $env:PALLADIN_LEGACY_KEYRING_TEST_PROFILE
            if ($LASTEXITCODE -ne 0) { throw 'legacy credential deletion assertion failed' }
          } finally {
            node packaging/npm/run-bounded.mjs 30 node `
              packaging/npm/legacy-keyring-interop.mjs cleanup `
              $env:PALLADIN_LEGACY_KEYRING_TEST_PROFILE
            if ($LASTEXITCODE -ne 0) { throw 'legacy credential cleanup failed' }
          }
      - run: cargo build --release --locked --target ${{ matrix.target }} -p palladin-cli
      - run: ./target/${{ matrix.target }}/release/palladin.exe --version
      - run: cargo build --release --locked --target ${{ matrix.target }} -p palladin-windows-broker -p palladin-windows-executor --bins
      - name: Stage the attested CLI as the fixed broker worker
        shell: pwsh
        run: Copy-Item -LiteralPath './target/${{ matrix.target }}/release/palladin.exe' -Destination './target/${{ matrix.target }}/release/palladin-worker.exe'
      - name: Validate all five native PE outputs
        shell: pwsh
        run: |
          Import-Module (Resolve-Path '../packaging/windows/scripts/Palladin.Release.psm1') -Force
          foreach ($name in 'palladin-client', 'palladin-companion', 'palladin-service', 'palladin-worker', 'palladin-executor') {
            Assert-PalladinArchitecture -Path "./target/${{ matrix.target }}/release/$name.exe" -Architecture '${{ matrix.architecture }}'
          }

  linux:
    name: Build ${{ matrix.gnu_target }} and ${{ matrix.musl_target }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            gnu_target: x86_64-unknown-linux-gnu
            musl_target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            gnu_target: aarch64-unknown-linux-gnu
            musl_target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: runtime
    env:
      GLIBC_BASELINE: "2.34"
      CC_x86_64_unknown_linux_musl: musl-gcc
      CC_aarch64_unknown_linux_musl: musl-gcc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - id: ci_policy_key
        name: Create an ephemeral Linux CI policy signer
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          private_key="$RUNNER_TEMP/linux-ci-version-policy-private.pem"
          public_key="$RUNNER_TEMP/linux-ci-version-policy-public.txt"
          node packaging/npm/generate-version-policy-ci-key.mjs \
            --output-private-key "$private_key" --output-public-key "$public_key"
          {
            echo "private_key=$private_key"
            echo "public_key=$(cat "$public_key")"
            echo "public_key_file=$public_key"
            echo "source_sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2
          cache-key: ${{ matrix.gnu_target }}
      - name: Install the pinned glibc baseline builder
        run: cargo install --locked --version 0.23.0 cargo-zigbuild
      - run: sudo apt-get update && sudo apt-get install --yes gcc libxml2-utils musl-tools rpm
      - run: rustup target add ${{ matrix.gnu_target }} ${{ matrix.musl_target }}
      - name: Validate Linux packaging source
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          bash -n packaging/linux/scripts/*.sh packaging/linux/deb/*.sh packaging/linux/rpm/*.sh packaging/linux/tests/*.sh
          xmllint --noout packaging/linux/polkit/io.palladin.runtime.policy
          cc -Wall -Wextra -Werror packaging/linux/tests/security-boundary-probe.c -o /tmp/palladin-security-boundary-probe
          cc -Wall -Wextra -Werror -shared -fPIC packaging/linux/tests/ld-preload-probe.c -o /tmp/palladin-ld-preload-probe.so
      - run: >-
          cargo clippy --workspace --all-targets --locked --target ${{ matrix.gnu_target }}
          --exclude palladin-windows-broker -- -D warnings
      - run: >-
          cargo clippy --workspace --all-targets --locked --target ${{ matrix.musl_target }}
          --exclude palladin-windows-broker -- -D warnings
        env:
          CC: musl-gcc
      - run: >-
          cargo zigbuild --release --locked
          --target "${{ matrix.gnu_target }}.${GLIBC_BASELINE}" -p palladin-cli
        env:
          PALLADIN_PRODUCTION_BUILD: "1"
          PALLADIN_VERSION_POLICY_PUBLIC_KEY: ${{ steps.ci_policy_key.outputs.public_key }}
          SOURCE_SHA: ${{ steps.ci_policy_key.outputs.source_sha }}
      - run: >-
          cargo test --workspace --locked --target ${{ matrix.gnu_target }}
          --exclude palladin-windows-broker
      - name: Prove Node-seeded Linux keyring records are deleted by Rust
        working-directory: .
        shell: bash
        env:
          PALLADIN_LEGACY_KEYRING_TEST_PROFILE: cvt332-${{ github.run_id }}-${{ matrix.gnu_target }}
          PALLADIN_LEGACY_KEYRING_TEST_BACKEND: keyutils
        run: |
          set -euo pipefail
          cleanup() {
            node packaging/npm/run-bounded.mjs 30 node \
              packaging/npm/legacy-keyring-interop.mjs cleanup \
              "$PALLADIN_LEGACY_KEYRING_TEST_PROFILE"
          }
          trap cleanup EXIT
          npm ci --ignore-scripts --workspaces=false
          node packaging/npm/run-bounded.mjs 30 node \
            packaging/npm/legacy-keyring-interop.mjs seed \
            "$PALLADIN_LEGACY_KEYRING_TEST_PROFILE"
          node packaging/npm/run-bounded.mjs 60 rustup run 1.97.0 cargo test \
            --manifest-path runtime/Cargo.toml --locked --target "${{ matrix.gnu_target }}" \
            -p palladin-platform \
            legacy_typescript_store::tests::os_adapter_deletes_credentials_seeded_by_the_legacy_node_client \
            -- --ignored --exact
          node packaging/npm/run-bounded.mjs 30 node \
            packaging/npm/legacy-keyring-interop.mjs assert-missing \
            "$PALLADIN_LEGACY_KEYRING_TEST_PROFILE"
      - run: >-
          cargo zigbuild --release --locked
          --target "${{ matrix.gnu_target }}.${GLIBC_BASELINE}"
          -p palladin-linux-broker -p palladin-linux-executor --bins
        env:
          PALLADIN_PRODUCTION_BUILD: "1"
          PALLADIN_VERSION_POLICY_PUBLIC_KEY: ${{ steps.ci_policy_key.outputs.public_key }}
          SOURCE_SHA: ${{ steps.ci_policy_key.outputs.source_sha }}
      - run: >-
          cargo zigbuild --release --locked
          --target "${{ matrix.gnu_target }}.${GLIBC_BASELINE}"
          -p palladin-linux-broker --example package_state_fixture
        env:
          PALLADIN_PRODUCTION_BUILD: "1"
          PALLADIN_VERSION_POLICY_PUBLIC_KEY: ${{ steps.ci_policy_key.outputs.public_key }}
          SOURCE_SHA: ${{ steps.ci_policy_key.outputs.source_sha }}
      - run: cargo build --release --locked --target ${{ matrix.musl_target }} -p palladin-cli
        env:
          CC: musl-gcc
          PALLADIN_PRODUCTION_BUILD: "1"
          PALLADIN_VERSION_POLICY_PUBLIC_KEY: ${{ steps.ci_policy_key.outputs.public_key }}
          SOURCE_SHA: ${{ steps.ci_policy_key.outputs.source_sha }}
      - run: cargo build --release --locked --target ${{ matrix.musl_target }} -p palladin-linux-broker --bin palladin-linux-client
        env:
          CC: musl-gcc
          PALLADIN_PRODUCTION_BUILD: "1"
          PALLADIN_VERSION_POLICY_PUBLIC_KEY: ${{ steps.ci_policy_key.outputs.public_key }}
          SOURCE_SHA: ${{ steps.ci_policy_key.outputs.source_sha }}
      - run: >-
          cargo test --workspace --locked --target ${{ matrix.musl_target }}
          --exclude palladin-windows-broker
        env:
          CC: musl-gcc
      - run: ./target/${{ matrix.gnu_target }}/release/palladin --version
      - run: ./target/${{ matrix.musl_target }}/release/palladin --version
      - name: Build glibc npm and system packages
        working-directory: .
        shell: bash
        env:
          ARCHITECTURE: ${{ matrix.gnu_target == 'x86_64-unknown-linux-gnu' && 'x64' || 'arm64' }}
        run: |
          set -euo pipefail
          native="runtime/target/${{ matrix.gnu_target }}/release"
          for binary in palladin palladin-linux-client palladin-linux-service palladin-linux-executor palladin-linux-admin-purge; do
            maximum=$(readelf --version-info "$native/$binary" |
              sed -n 's/.*Name: GLIBC_\([0-9.]*\).*/\1/p' | sort -V | tail -n 1)
            if [[ -z $maximum ]] ||
              [[ $(printf '%s\n' "$maximum" "$GLIBC_BASELINE" | sort -V | tail -n 1) != "$GLIBC_BASELINE" ]]; then
              echo "$binary requires glibc ${maximum:-unknown}; maximum supported is $GLIBC_BASELINE" >&2
              exit 1
            fi
          done
          cp "$native/palladin" "$native/palladin-worker"
          stage="$RUNNER_TEMP/npm-linux-$ARCHITECTURE"
          packaging/linux/scripts/stage-npm-platform-package.sh \
            --architecture "$ARCHITECTURE" --libc glibc --binaries "$native" --output "$stage"
          node -e '
            const manifest = require(process.argv[1]);
            if (manifest.private !== undefined) process.exit(1);
            if (JSON.stringify(manifest.os) !== JSON.stringify(["linux"])) process.exit(1);
            if (JSON.stringify(manifest.cpu) !== JSON.stringify([process.argv[2]])) process.exit(1);
            if (JSON.stringify(manifest.libc) !== JSON.stringify(["glibc"])) process.exit(1);
            if (manifest.scripts !== undefined) process.exit(1);
          ' "$stage/package.json" "$ARCHITECTURE"
          output="$RUNNER_TEMP/linux-packages/base"
          packaging/linux/deb/build-deb.sh \
            --version 0.1.0 --architecture "$ARCHITECTURE" --binaries "$native" --output "$output"
          packaging/linux/rpm/build-rpm.sh \
            --version 0.1.0 --architecture "$ARCHITECTURE" --binaries "$native" --output "$output"
          test "$(find "$output" -name '*.deb' | wc -l)" -eq 1
          test "$(find "$output" -name '*.rpm' | wc -l)" -eq 1
          output="$RUNNER_TEMP/linux-packages/upgrade"
          packaging/linux/deb/build-deb.sh \
            --version 0.1.1 --architecture "$ARCHITECTURE" --binaries "$native" --output "$output"
          packaging/linux/rpm/build-rpm.sh \
            --version 0.1.1 --architecture "$ARCHITECTURE" --binaries "$native" --output "$output"
      - name: Build and run the native musl npm package on Alpine
        working-directory: .
        shell: bash
        env:
          ARCHITECTURE: ${{ matrix.musl_target == 'x86_64-unknown-linux-musl' && 'x64' || 'arm64' }}
        run: |
          set -euo pipefail
          native="runtime/target/${{ matrix.musl_target }}/release"
          cp "$native/palladin" "$native/palladin-worker"
          stage="$RUNNER_TEMP/npm-linux-$ARCHITECTURE-musl"
          packaging/linux/scripts/stage-npm-platform-package.sh \
            --architecture "$ARCHITECTURE" --libc musl --binaries "$native" --output "$stage"
          node -e '
            const manifest = require(process.argv[1]);
            if (manifest.private !== undefined) process.exit(1);
            if (JSON.stringify(manifest.os) !== JSON.stringify(["linux"])) process.exit(1);
            if (JSON.stringify(manifest.cpu) !== JSON.stringify([process.argv[2]])) process.exit(1);
            if (JSON.stringify(manifest.libc) !== JSON.stringify(["musl"])) process.exit(1);
            if (manifest.scripts !== undefined) process.exit(1);
          ' "$stage/package.json" "$ARCHITECTURE"
          for binary in palladin-linux-client palladin-worker; do
            if readelf --program-headers "$stage/bin/$binary" | grep -Fq ' INTERP '; then
              echo "$binary unexpectedly has a dynamic ELF interpreter" >&2
              exit 1
            fi
            if readelf --dynamic "$stage/bin/$binary" | grep -Fq '(NEEDED)'; then
              echo "$binary unexpectedly needs a dynamic library" >&2
              exit 1
            fi
          done
          npm ci --ignore-scripts --workspaces=false
          npm run build
          source_sha=${{ steps.ci_policy_key.outputs.source_sha }}
          policy="$RUNNER_TEMP/linux-$ARCHITECTURE-ci-version-policy.json"
          node packaging/npm/generate-version-policy-ci-fixture.mjs \
            --package-root "$RUNNER_TEMP/npm-linux-$ARCHITECTURE" \
            --package-root "$stage" --version 0.1.0 --source-sha "$source_sha" \
            --private-key "${{ steps.ci_policy_key.outputs.private_key }}" \
            --public-key "${{ steps.ci_policy_key.outputs.public_key_file }}" \
            --output-bundle "$policy"
          rm -f "${{ steps.ci_policy_key.outputs.private_key }}"
          node packaging/npm/configure-version-policy-build.mjs \
            --public-key "${{ steps.ci_policy_key.outputs.public_key }}" \
            --source-sha "$source_sha" --bundle "$policy"
          npm run build
          launcher="$RUNNER_TEMP/alpine-launcher"
          install -d "$launcher/node_modules/@palladin"
          cp -R dist package.json "$launcher/"
          cp -R "$RUNNER_TEMP/npm-linux-$ARCHITECTURE" \
            "$launcher/node_modules/@palladin/runtime-linux-$ARCHITECTURE-gnu"
          cp -R "$stage" "$launcher/node_modules/@palladin/runtime-linux-$ARCHITECTURE-musl"
          docker run --rm --platform "linux/${{ matrix.musl_target == 'x86_64-unknown-linux-musl' && 'amd64' || 'arm64' }}" \
            --volume "$launcher:/launcher:ro" --workdir /launcher \
            --tmpfs /tmp node:22-alpine3.22 sh -eu -c '
              expected=${{ matrix.musl_target == 'x86_64-unknown-linux-musl' && 'x86_64' || 'aarch64' }}
              test "$(uname -m)" = "$expected"
              node dist/bin/palladin.js --version
              node dist/bin/palladin.js doctor | grep -F "standalone-security-tier: Convenience"
              node dist/bin/palladin.js doctor | grep -F \
                "hardened-candidate: unsupported - Alpine/OpenRC Hardened is not available in the MVP"
              export HOME=/tmp/palladin-home
              install -d -m 0700 "$HOME"
              if node dist/bin/palladin.js init >/tmp/init.out 2>/tmp/init.err; then
                echo "init unexpectedly succeeded without Secret Service" >&2
                exit 1
              fi
              test ! -e "$HOME/.palladin/agent.key"
              test ! -e "$HOME/.palladin/config.json"
            '
      - name: Install, upgrade, roll back, and reinstall on Debian, Fedora, and Rocky 9
        working-directory: .
        shell: bash
        env:
          ARCHITECTURE: ${{ matrix.gnu_target == 'x86_64-unknown-linux-gnu' && 'x64' || 'arm64' }}
        run: |
          set -euo pipefail
          packaging/linux/tests/test-package-family.sh debian \
            "$(find "$RUNNER_TEMP/linux-packages/base" -name '*.deb' -print -quit)" \
            "$(find "$RUNNER_TEMP/linux-packages/upgrade" -name '*.deb' -print -quit)" \
            "runtime/target/${{ matrix.gnu_target }}/release/examples/package_state_fixture" \
            "$RUNNER_TEMP/linux-$ARCHITECTURE-ci-version-policy.json"
          packaging/linux/tests/test-package-family.sh fedora \
            "$(find "$RUNNER_TEMP/linux-packages/base" -name '*.rpm' -print -quit)" \
            "$(find "$RUNNER_TEMP/linux-packages/upgrade" -name '*.rpm' -print -quit)" \
            "runtime/target/${{ matrix.gnu_target }}/release/examples/package_state_fixture" \
            "$RUNNER_TEMP/linux-$ARCHITECTURE-ci-version-policy.json"
          packaging/linux/tests/test-package-family.sh rocky9 \
            "$(find "$RUNNER_TEMP/linux-packages/base" -name '*.rpm' -print -quit)" \
            "$(find "$RUNNER_TEMP/linux-packages/upgrade" -name '*.rpm' -print -quit)" \
            "runtime/target/${{ matrix.gnu_target }}/release/examples/package_state_fixture" \
            "$RUNNER_TEMP/linux-$ARCHITECTURE-ci-version-policy.json"
      - name: Verify native UID, ptrace, loader, and peer boundaries
        working-directory: .
        shell: bash
        env:
          ARCHITECTURE: ${{ matrix.gnu_target == 'x86_64-unknown-linux-gnu' && 'x64' || 'arm64' }}
        run: |
          set -euo pipefail
          packaging/linux/tests/test-convenience-boundary.sh
          sudo sysctl -w kernel.yama.ptrace_scope=0
          deb=$(find "$RUNNER_TEMP/linux-packages/upgrade" -name '*.deb' -print -quit)
          sudo apt-get install --yes "$deb"
          sudo packaging/linux/tests/test-hardened-boundary.sh

  native-platform-gate:
    name: Native Platform Gate
    if: always()
    needs: [apple, windows, linux]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every native OS, CPU, and libc gate
        env:
          APPLE: ${{ needs.apple.result }}
          WINDOWS: ${{ needs.windows.result }}
          LINUX: ${{ needs.linux.result }}
        run: |
          test "$APPLE" = success
          test "$WINDOWS" = success
          test "$LINUX" = success
