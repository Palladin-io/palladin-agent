name: Verify Public Version Policy

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: read

concurrency:
  group: palladin-version-policy-verify
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'schedule' || github.actor == 'patryk-roguszewski'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci --ignore-scripts --workspaces=false
      - run: npm run build
      - name: Verify signature, freshness, deprecations, and latest tags without npm credentials
        run: >-
          node packaging/npm/verify-version-policy-registry.mjs
          --public-key "${{ vars.PALLADIN_VERSION_POLICY_PUBLIC_KEY }}"
