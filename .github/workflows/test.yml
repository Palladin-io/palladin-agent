name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node }} - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts --workspaces=false
      - run: npm run lint
      - run: npm run build
      - run: npm test

  minimum-npm-platform-selection:
    name: npm 9.7.1 platform selection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm install --global npm@9.7.1
      - run: npm --version | grep -Fx '9.7.1'
      - run: npm ci --ignore-scripts --workspaces=false
      - run: npm run build
      - run: npm exec -- vitest run tests/runtime/npm-install-selection.test.ts tests/runtime/npm-install-modes.test.ts
        env:
          PALLADIN_NPM_SELECTION_NATIVE_ONLY: "1"
